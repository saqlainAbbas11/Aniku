<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0" />
  <title>Aniku · Creator Saqlain Abbas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --bg: #eae8f0;
      --card-bg: #f0eef7;
      --shadow: 12px 12px 24px #b8b4c4, -12px -12px 24px #ffffff;
      --shadow-inset: inset 4px 4px 10px #b8b4c4, inset -4px -4px 10px #ffffff;
      --shadow-soft: 6px 6px 14px #b8b4c4, -6px -6px 14px #ffffff;
      --p: #8b6bff;
      --p2: #b19eff;
      --pink: #ff5e7a;
      --mint: #4dd9b3;
      --sky: #6bb6ff;
      --peach: #ff9f6b;
      --lemon: #f5d000;
      --ink: #201e3a;
      --ink2: #49446b;
      --muted: #7a7799;
      --white: #f6f4fe;
      --r: 24px;
      --r2: 16px;
      --rs: 12px;
      --max-w: 600px;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 14px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .app {
      max-width: var(--max-w);
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 30px;
    }
    .neu {
      background: var(--card-bg);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .neu-inset {
      background: var(--card-bg);
      border-radius: var(--r2);
      box-shadow: var(--shadow-inset);
    }
    .neu-soft {
      background: var(--card-bg);
      border-radius: var(--r2);
      box-shadow: var(--shadow-soft);
    }
    .neu-pressed {
      box-shadow: var(--shadow-inset);
      transform: scale(0.98);
    }
    .topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  gap: 8px;
  flex-wrap: nowrap;
}
    .wordmark {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -1.5px;
  color: var(--ink);
  flex-shrink: 0;
}
    .sam {
  font-style: normal;
  background: linear-gradient(145deg, #df314e, #8f7900, #4dd9b3, #2064a8, #8b6bff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
  background-size: 300% 300%;
  animation: shimmer 3s ease infinite;
}

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Underline animation on hover */
.sam::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(145deg, #8b6bff, #b19eff);
  transition: width 0.3s ease;
  border-radius: 2px;
}

.sam:hover::after {
  width: 100%;
}

.sam:hover {
  transform: scale(1.02);
  filter: brightness(1.1);
}

.creator-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px 4px 8px;
  background: var(--card-bg);
  border-radius: 40px;
  box-shadow: var(--shadow-soft);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
  transition: 0.2s;
  position: relative;
  cursor: default;
}



.creator-wrap:hover {
  box-shadow: var(--shadow-inset);
}

.creator-wrap i {
  font-size: 12px;
  color: var(--mint);
  opacity: 0.8;
}

/* Optional: Add a subtle neumorphic pill around the creator name */
.topbar .creator-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px 4px 8px;
  background: var(--card-bg);
  border-radius: 40px;
  box-shadow: var(--shadow-soft);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
  transition: 0.2s;
}

@media (max-width: 480px) {
  .wordmark {
    font-size: 20px;
  }
}

.creator-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px 4px 8px;
  background: var(--card-bg);
  border-radius: 40px;
  box-shadow: var(--shadow-soft);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink2);
  transition: 0.2s;
  position: relative;
  cursor: default;
  flex-shrink: 1;
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
}

@media (max-width: 480px) {
  .creator-wrap {
    padding: 3px 8px 3px 6px;
    font-size: 10px;
    gap: 3px;
  }
  
  .creator-wrap i {
    font-size: 10px;
  }
  
  .creator-wrap span {
    font-size: 10px;
  }
}

@media (max-width: 380px) {
  .creator-wrap {
    padding: 2px 6px 2px 4px;
    font-size: 9px;
  }
  
  .creator-wrap i {
    display: none;
  }
}

.creator-wrap:hover {
  box-shadow: var(--shadow-inset);
}

.creator-wrap i {
  font-size: 11px;
  color: var(--mint);
  opacity: 0.8;
  flex-shrink: 0;
}

.topbar-icons {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

@media (max-width: 480px) {
  .topbar-icons {
    gap: 6px;
  }
  
  .icon-btn {
    width: 36px;
    height: 36px;
    font-size: 15px;
  }
}

.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--card-bg);
  box-shadow: var(--shadow-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 17px;
  color: var(--ink2);
  transition: 0.15s;
  position: relative;
  border: none;
  flex-shrink: 0;
}

@media (max-width: 380px) {
  .icon-btn {
    width: 32px;
    height: 32px;
    font-size: 13px;
  }
}

/* Update .sam styles */
.sam {
  font-style: normal;
  background: linear-gradient(145deg, #df314e, #8f7900, #4dd9b3, #2064a8, #8b6bff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
  background-size: 300% 300%;
  animation: shimmer 3s ease infinite;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  transition: all 0.3s ease;
  display: inline-block;
}

@media (max-width: 480px) {
  .sam {
    font-size: 11px;
  }
}

@media (max-width: 380px) {
  .sam {
    font-size: 10px;
  }
}

.topbar .creator-wrap:hover {
  box-shadow: var(--shadow-inset);
  transform: scale(0.97);
}

.topbar .creator-wrap i {
  font-size: 12px;
  color: var(--mint);
  opacity: 0.8;

/* Enlarge badge on the image */
.det-cover-wrapper {
  position: relative;
  overflow: hidden;
  border-radius: var(--r) var(--r) 0 0;
}

.det-cover-wrapper .enlarge-badge {
  position: absolute;
  bottom: 16px;
  right: 16px;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  color: white;
  padding: 8px 14px;
  border-radius: 40px;
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  transform: translateY(10px);

  border: 1px solid rgba(255, 255, 255, 0.1);
  pointer-events: none;
  letter-spacing: 0.5px;
}

.det-cover-wrapper:hover .enlarge-badge {
  opacity: 1;
  transform: translateY(0);
}

.det-cover-wrapper .enlarge-badge i {
  font-size: 14px;
}

/* Zoom icon on hover overlay */
.det-cover-wrapper::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(circle at center, rgba(139, 107, 255, 0.15), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  z-index: 2;
}

.det-cover-wrapper:hover::after {
  opacity: 1;
}

.poster-modal {

  align-items: center;

  max-height: 90%;

  justify-content: center;

}

  <script>
    // Poster Modal functionality
const posterModal = document.getElementById('posterModal');
const posterImage = document.getElementById('posterImage');
const closePosterModal = document.getElementById('closePosterModal');

// Function to open poster modal
function openPosterModal(imgSrc) {
  if (!imgSrc) return;
  posterImage.src = imgSrc;
  posterModal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

// Function to close poster modal
function closePosterModalFn() {
  posterModal.classList.remove('open');
  document.body.style.overflow = '';
  posterImage.src = '';
}

// Close on button click
closePosterModal.addEventListener('click', closePosterModalFn);

// Close on backdrop click
posterModal.addEventListener('click', (e) => {
  if (e.target === posterModal) {
    closePosterModalFn();
  }
});

// Close on ESC key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closePosterModalFn();
  }
});

      async function fetchJikan(mode, q, page) {
        try {
          let url;
          if (q) url =
            `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=12&page=${page}`;
          else if (mode === 'airing') url =
            `https://api.jikan.moe/v4/top/anime?filter=airing&limit=12&page=${page}`;
          else if (mode === 'top') url =
            `https://api.jikan.moe/v4/top/anime?limit=12&page=${page}`;
          else if (mode === 'upcoming') url =
            `https://api.jikan.moe/v4/top/anime?filter=upcoming&limit=12&page=${page}`;
          else if (mode === 'manga') url =
            `https://api.jikan.moe/v4/top/manga?limit=12&page=${page}`;
          else url = `https://api.jikan.moe/v4/top/anime?limit=12&page=${page}`;
          const res = await fetch(url);
          const j = await res.json();
          return (j.data || []).map(a => ({
            id: 'jikan_' + a.mal_id,
            src: 'jikan',
            rawId: a.mal_id,
            title: a.title,
            titleEn: a.title_english || '',
            img: a.images?.jpg?.image_url || '',
            imgLg: a.images?.jpg?.large_image_url || '',
            score: a.score ? a.score * 10 : null,
            eps: a.episodes,
            status: a.status,
            type: a.type,
            year: a.year || a.aired?.prop?.from?.year,
            genres: (a.genres || []).map(g => g.name).slice(0, 3),
            synopsis: a.synopsis,
            rank: a.rank,
            members: a.members,
            isManga: mode === 'manga' || a.type === 'Manga'
          }));
        } catch { return []; }
      }

      async function fetchAniList(mode, q, page) {
        const isSearch = !!q;
        const perPage = 12;
        const gql = isSearch ?
          `query($s:String,$page:Int){Page(page:$page,perPage:${perPage}){media(search:$s,type:ANIME,sort:POPULARITY_DESC){id title{romaji english}coverImage{large}averageScore episodes status startDate{year}genres description}}}` :
          mode === 'manga' ?
          `query($page:Int){Page(page:$page,perPage:${perPage}){media(type:MANGA,sort:POPULARITY_DESC){id title{romaji english}coverImage{large}averageScore chapters status startDate{year}genres description}}}` :
          mode === 'top' ?
          `query($page:Int){Page(page:$page,perPage:${perPage}){media(type:ANIME,sort:SCORE_DESC){id title{romaji english}coverImage{large}averageScore episodes status startDate{year}genres description}}}` :
          mode === 'upcoming' ?
          `query($page:Int){Page(page:$page,perPage:${perPage}){media(type:ANIME,sort:START_DATE_DESC,status:NOT_YET_RELEASED){id title{romaji english}coverImage{large}averageScore episodes status startDate{year}genres description}}}` :
          `query($page:Int){Page(page:$page,perPage:${perPage}){media(type:ANIME,sort:TRENDING_DESC){id title{romaji english}coverImage{large}averageScore episodes status startDate{year}genres description}}}`;
        try {
          const res = await fetch('https://graphql.anilist.co', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: gql, variables: isSearch ? { s: q, page } : { page } })

          const items = j.data?.Page?.media || [];
          return items.map(a => ({

            rawId: a.id,
            title: a.title.romaji,
            titleEn: a.title.english || '',

            score: a.averageScore,
            eps: a.episodes || a.chapters,

            genres: (a.genres || []).slice(0, 3),
            synopsis: a.description?.replace(/<[^>]+>/g, ''),
            isManga: mode === 'manga'
          }));
        } catch { return []; }
      }

            `https://kitsu.io/api/edge/manga?sort=-userCount&page[limit]=${limit}&page[offset]=${(page-1)*limit}&fields[manga]=canonicalTitle,posterImage,averageRating,chapterCount,status,startDate,synopsis`;
          else if (mode === 'top') url =
            `https://kitsu.io/api/edge/anime?sort=-averageRating&page[limit]=${limit}&page[offset]=${(page-1)*limit}&fields[anime]=canonicalTitle,posterImage,averageRating,showType,episodeCount,status,startDate,synopsis`;
          else url =
            `https://kitsu.io/api/edge/anime?sort=-userCount&page[limit]=${limit}&page[offset]=${(page-1)*limit}&fields[anime]=canonicalTitle,posterImage,averageRating,showType,episodeCount,status,startDate,synopsis`;
          const res = await fetch(url, { headers: KITSU_H });
          const j = await res.json();
          return (j.data || []).map(a => ({
            id: 'kitsu_' + a.id,
            src: 'kitsu',
            rawId: a.id,
            title: a.attributes.canonicalTitle,
            titleEn: '',
            img: a.attributes.posterImage?.small || '',
            imgLg: a.attributes.posterImage?.large || '',
            score: a.attributes.averageRating,
            eps: a.attributes.episodeCount || a.attributes.chapterCount,
            status: a.attributes.status,
            year: a.attributes.startDate?.slice(0, 4),
            genres: [],
            synopsis: a.attributes.synopsis,
            isManga: mode === 'manga'
          }));
        } catch { return []; }
      }

      async function fetchMangaDex(q, page) {
        try {
          const limit = 12;
          const offset = (page - 1) * limit;
          let url = q ?
            `https://api.mangadex.org/manga?title=${encodeURIComponent(q)}&limit=${limit}&offset=${offset}&includes[]=cover_art&order[relevance]=desc` :
            `https://api.mangadex.org/manga?limit=${limit}&offset=${offset}&includes[]=cover_art&order[followedCount]=desc&status[]=ongoing`;
          const res = await fetch(url);
          const j = await res.json();
          return (j.data || []).map(m => {
            const cover = m.relationships?.find(r => r.type === 'cover_art');
            const fn = cover?.attributes?.fileName;
            const img = fn ? `https://uploads.mangadex.org/covers/${m.id}/${fn}.256.jpg` : '';
            const title = m.attributes.title?.en || m.attributes.title?.ja || Object.values(m.attributes.title || {})[
              0] || '';
            return {
              id: 'mdex_' + m.id,
              src: 'mangadex',
              rawId: m.id,
              title,
              titleEn: '',
              img,
              imgLg: img,
              score: null,
              eps: m.attributes.lastChapter,
              status: m.attributes.status,
              year: m.attributes.year,
              genres: (m.attributes.tags || []).filter(t => t.attributes.group === 'genre').map(t => t.attributes.name
                .en).slice(0, 3),
              synopsis: m.attributes.description?.en || '',
              isManga: true
            };
          });
        } catch { return []; }
      }

      async function loadMore(src, cat, q, pageNum, append = true) {
        if (isLoading) return;
        isLoading = true;
        const main = document.getElementById('main');
        if (!append) {
          main.innerHTML = '';
          page = 1;
          hasMore = true;
        }
        const loader = document.createElement('div');
        loader.className = 'infinite-trigger';
        loader.id = 'infiniteLoader';
        loader.textContent = 'Loading more…';
        main.appendChild(loader);

        const isManga = cat === 'manga';
        let items = [];
        if (src === 'all' || src === 'jikan') {
          const d = await fetchJikan(cat, q, pageNum);
          items = items.concat(d);
        }
        if (src === 'all' || src === 'anilist') {
          const d = await fetchAniList(cat, q, pageNum);
          items = items.concat(d);
        }
        if (src === 'all' || src === 'kitsu') {
          const d = await fetchKitsu(cat, q, pageNum);
          items = items.concat(d);
        }
        if (isManga || src === 'mangadex') {
          const d = await fetchMangaDex(q, pageNum);
          items = items.concat(d);
        }

        const l = document.getElementById('infiniteLoader');
        if (l) l.remove();

        if (!items.length) {
          hasMore = false;
          const endMsg = document.createElement('div');
          endMsg.className = 'infinite-trigger';
          endMsg.textContent = '✨ That\'s all for now';
          main.appendChild(endMsg);
          isLoading = false;
          return;
        }

        const seen = new Set();
        const unique = items.filter(a => {
          if (seen.has(a.id)) return false;
          seen.add(a.id);
          return true;
        });

        if (!append) {
          main.innerHTML = '';
        }

        renderItems(unique, main, append);
        // store for favs
        unique.forEach(a => { allData[a.src] = allData[a.src] || [];
          allData[a.src].push(a); });

        isLoading = false;
        if (unique.length < 12) hasMore = false;
        setupInfiniteScroll();
      }

      function renderItems(items, container, append) {
        const groups = {};
        items.forEach(a => {
          if (!groups[a.src]) groups[a.src] = [];
          groups[a.src].push(a);
        });

        let idx = 0;
        for (const [src, arr] of Object.entries(groups)) {
          const sc = SRC_COLORS[src] || SRC_COLORS.jikan;
          const secEl = document.createElement('div');
          secEl.className = 'flex-col gap-8 anim';
          secEl.style.animationDelay = (idx * 0.05) + 's';
          secEl.style.display = 'flex';
          secEl.style.flexDirection = 'column';
          secEl.style.gap = '8px';

          const hdr = document.createElement('div');
          hdr.className = 'sec-hdr';
          hdr.innerHTML =
            `<span class="sec-label"><span class="dot" style="background:${sc.dot};"></span>${src.toUpperCase()}</span>`;
          secEl.appendChild(hdr);

          if (arr[0]) {
            const a = arr[0];
            const fc = document.createElement('div');
            fc.className = 'feat-card anim';
            fc.style.animationDelay = '0.05s';
            const img = a.imgLg || a.img;
            const genreHtml = (a.genres || []).map(g => `<span class="feat-tag">${g}</span>`).join('');
            fc.innerHTML = `
              <img class="feat-img" src="${img}" alt="${a.title}" loading="lazy" onerror="this.style.background='#d9d3e8';this.removeAttribute('src')"/>
              <div class="feat-overlay">
                <span class="feat-src-badge" style="background:${sc.bg};color:${sc.color};">${src.toUpperCase()}</span>
                <span class="feat-score"><i class="fas fa-star" style="color:#f59e0b;"></i> ${scoreStr(a.score)}</span>
                <div class="feat-title">${a.title}</div>
                <div class="feat-meta">${a.type||(a.isManga?'Manga':'Anime')} ${a.year?'· '+a.year:''} ${a.eps?'· '+a.eps+(a.isManga?' ch':' ep'):''}</div>
                ${genreHtml?`<div class="feat-tags">${genreHtml}</div>`:''}
              </div>
            `;
            fc.addEventListener('click', () => openDetail(a));
            secEl.appendChild(fc);
          }

          const gridItems = arr.slice(1, 7);
          if (gridItems.length) {
            const grid = document.createElement('div');
            grid.className = 'bento';
            gridItems.forEach((a, i) => {
              const p = pal(i);
              const isFav = favs.has(a.id);
              const statusTxt = a.status ? (a.status.charAt(0).toUpperCase() + a.status.slice(1).toLowerCase())
                .replace(/_/g, ' ') : '—';
              const card = document.createElement('div');
              card.className = 'a-card anim';
              card.style.animationDelay = (i * 0.04) + 's';
              card.innerHTML = `
                <div class="a-img-wrap" style="background:${p.bg};">
                  <img class="a-img" src="${a.img}" alt="${a.title}" loading="lazy" onerror="this.style.background='${p.bg}';this.removeAttribute('src')"/>
                  <div class="a-score-pill"><i class="fas fa-star" style="color:#f59e0b;font-size:8px;"></i> ${scoreStr(a.score)}</div>
                  <button class="a-fav ${isFav?'active':''}" data-id="${a.id}">${isFav?'♥':'♡'}</button>
                </div>
                <div class="a-body">
                  <div class="a-title">${a.title}</div>
                  <div class="a-sub"><span class="sdot" style="background:${a.status==='finished'||a.status==='FINISHED'?'#6b7280':a.status==='upcoming'||a.status==='NOT_YET_RELEASED'?'#f59e0b':'#10b981'};"></span>${statusTxt}</div>
                </div>
              `;
              const favBtn = card.querySelector('.a-fav');
              favBtn.addEventListener('click', e => {
                e.stopPropagation();
                const el = e.currentTarget;
                if (favs.has(a.id)) { favs.delete(a.id);
                  el.classList.remove('active');
                  el.textContent = '♡'; } else { favs.add(a.id);
                  el.classList.add('active');
                  el.textContent = '♥'; }
                updateFavBadge();
              });
              card.addEventListener('click', () => openDetail(a));
              grid.appendChild(card);
            });
            secEl.appendChild(grid);
          }

          const rowItems = arr.slice(7, 10);
          rowItems.forEach((a, i) => {
            const rc = document.createElement('div');
            rc.className = 'row-card anim';
            rc.style.animationDelay = (i * 0.04 + 0.2) + 's';
            const sc2 = SRC_COLORS[a.src] || SRC_COLORS.jikan;
            rc.innerHTML = `
              <img class="row-img" src="${a.img}" alt="${a.title}" loading="lazy" onerror="this.style.background='#d9d3e8';this.removeAttribute('src')"/>
              <div class="row-body">
                <div class="row-title">${a.title}</div>
                <div class="row-meta">${a.year||'—'} ${a.eps?'· '+a.eps+(a.isManga?' ch':' ep'):''}</div>
                <div class="row-score"><i class="fas fa-star" style="color:#f59e0b;"></i> ${scoreStr(a.score)} <span class="row-src" style="background:${sc2.bg};color:${sc2.color};">${a.src}</span></div>
              </div>
            `;
            rc.addEventListener('click', () => openDetail(a));
            secEl.appendChild(rc);
          });

          container.appendChild(secEl);
          idx++;
        }

        if (hasMore) {
          const trigger = document.createElement('div');
          trigger.className = 'infinite-trigger';
          trigger.id = 'infiniteTrigger';
          
          container.appendChild(trigger);
        }
      }

      let observer = null;

      function setupInfiniteScroll() {
        if (observer) observer.disconnect();
        const trigger = document.getElementById('infiniteTrigger');
        if (!trigger) return;
        observer = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting && hasMore && !isLoading) {
            page++;
            loadMore(currentSrc, currentCat, currentQuery, page);
          }
        }, { rootMargin: '100px' });
        observer.observe(trigger);
      }

      async function openDetail(a) {
        document.getElementById('main').style.display = 'none';
        const det = document.getElementById('detail');
        det.classList.add('open');
        const dc = document.getElementById('detContent');
        dc.innerHTML = `<div class="loading"><div class="spinner"></div><div class="ld-txt">Loading details…</div></div>`;

        let extra = {};
        try {
          if (a.src === 'jikan') {
            const r = await fetch(`https://api.jikan.moe/v4/${a.isManga?'manga':'anime'}/${a.rawId}`);
            const j = await r.json();
            extra = { score: j.data?.score ? j.data.score * 10 : a.score, synopsis: j.data?.synopsis || a.synopsis,
              members: j.data?.members, rank: j.data?.rank, genres: (j.data?.genres || []).map(g => g.name) };
          } else if (a.src === 'anilist') {
            const gql =
              `query($id:Int){Media(id:$id){coverImage{extraLarge}genres averageScore popularity description episodes chapters}}`;
            const r = await fetch('https://graphql.anilist.co', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ query: gql, variables: { id: a.rawId } })
            });
            const j = await r.json();
            const m = j.data?.Media;
            if (m) extra = { imgLg: m.coverImage?.extraLarge || a.imgLg, score: m.averageScore || a.score,
              synopsis: m.description?.replace(/<[^>]+>/g, '') || a.synopsis, genres: m.genres || [],
              popularity: m.popularity, eps: m.episodes || m.chapters };
          } else if (a.src === 'kitsu') {
            const r = await fetch(`https://kitsu.io/api/edge/${a.isManga?'manga':'anime'}/${a.rawId}?include=categories`, {
              headers: KITSU_H
            });
            const j = await r.json();
            const attr = j.data?.attributes;
            const cats = (j.included || []).filter(x => x.type === 'categories').map(x => x.attributes.name);
            if (attr) extra = { imgLg: attr.coverImage?.original || attr.posterImage?.large || a.imgLg,
              score: attr.averageRating || a.score, synopsis: attr.synopsis || a.synopsis, genres: cats,
              userCount: attr.userCount };
          }
        } catch {}

        const merged = { ...a, ...extra };
        const sc = SRC_COLORS[a.src] || SRC_COLORS.jikan;
        const genreChips = (merged.genres || []).map((g, i) =>
          `<span class="dmc" style="background:${pal(i).bg};color:${pal(i).txt};">${g}</span>`).join('');

        dc.innerHTML = `
          <div class="det-hero anim">
  <div class="det-cover-wrapper">
    <img class="det-cover" src="${merged.imgLg||merged.img}" alt="${merged.title}" onclick="openPosterModal('${merged.imgLg||merged.img}')" onerror="this.style.background='#d9d3e8';this.removeAttribute('src')"/>
    <div class="enlarge-badge">
      <i class="fas fa-expand"></i> Click to enlarge
    </div>
  </div>
            <div class="det-body">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                <div class="det-title">${merged.title}</div>
                <span style="padding:4px 12px;border-radius:40px;font-size:10px;font-weight:800;background:${sc.bg};color:${sc.color};flex-shrink:0;">${a.src.toUpperCase()}</span>
              </div>
              ${merged.titleEn?`<div class="det-eng">${merged.titleEn}</div>`:''}
              <div class="det-meta-chips">
                <span class="dmc" style="background:#ede5ff;color:#4a1d96;">${merged.isManga?'Manga':'Anime'}</span>
                ${merged.year?`<span class="dmc" style="background:#fffbd6;color:#78350f;">${merged.year}</span>`:''}
                ${merged.eps?`<span class="dmc" style="background:#c8f7ec;color:#065f46;">${merged.eps} ${merged.isManga?'ch':'ep'}</span>`:''}
                ${merged.status?`<span class="dmc" style="background:#ffd6e8;color:#7c2d46;">${merged.status}</span>`:''}
                ${genreChips}
              </div>
              <p class="det-syn">${truncate(merged.synopsis, 1200)}</p>
            </div>
          </div>
          <div class="det-stats anim anim-d1">
            <div class="ds" style="background:#ede5ff;"><div class="ds-v" style="color:#4a1d96;">${scoreStr(merged.score)}</div><div class="ds-l">Score</div></div>
            <div class="ds" style="background:#c8f7ec;"><div class="ds-v" style="color:#065f46;">${merged.eps||'—'}</div><div class="ds-l">${merged.isManga?'Chapters':'Episodes'}</div></div>
            ${merged.members?`<div class="ds" style="background:#d6eeff;"><div class="ds-v" style="color:#1a4a6b;font-size:16px;">${parseInt(merged.members).toLocaleString()}</div><div class="ds-l">MAL members</div></div>`:''}
            ${merged.popularity?`<div class="ds" style="background:#ffd6e8;"><div class="ds-v" style="color:#7c2d46;font-size:16px;">${parseInt(merged.popularity).toLocaleString()}</div><div class="ds-l">AniList fans</div></div>`:''}
            ${merged.userCount?`<div class="ds" style="background:#ffe8d6;"><div class="ds-v" style="color:#7c2d12;font-size:16px;">${parseInt(merged.userCount).toLocaleString()}</div><div class="ds-l">Kitsu users</div></div>`:''}
            ${merged.rank?`<div class="ds" style="background:#fffbd6;"><div class="ds-v" style="color:#78350f;">#${merged.rank}</div><div class="ds-l">Rank</div></div>`:''}
          </div>
        `;
      }

      document.getElementById('backBtn').addEventListener('click', () => {
        document.getElementById('detail').classList.remove('open');
        document.getElementById('main').style.display = 'flex';
      });

      function renderFavsPanel() {
        const list = document.getElementById('favsList');
        const items = [...favs];
        if (!items.length) {
          list.innerHTML = '<div style="color:var(--muted);padding:8px 0;">No favourites yet.</div>';
          return;
        }
        const all = Object.values(allData).flat();
        const favItems = items.map(id => all.find(a => a.id === id)).filter(Boolean);
        if (!favItems.length) {
          list.innerHTML = '<div style="color:var(--muted);padding:8px 0;">No favourites loaded.</div>';
          return;
        }
        list.innerHTML = favItems.map(a => `
          <div class="fav-item">
            <img src="${a.img}" alt="${a.title}" onerror="this.style.background='#d9d3e8';this.removeAttribute('src')"/>
            <div class="info">
              <div class="title">${a.title}</div>
              <div class="meta">${a.src} · ${a.year||'—'}</div>
            </div>
            <button class="remove" data-id="${a.id}">&times;</button>
          </div>
        `).join('');
        list.querySelectorAll('.remove').forEach(el => {
          el.addEventListener('click', () => {
            const id = el.dataset.id;
            favs.delete(id);
            updateFavBadge();
            document.querySelectorAll(`.a-fav[data-id="${id}"]`).forEach(btn => {
              btn.classList.remove('active');
              btn.textContent = '♡';
            });
            renderFavsPanel();
          });
        });
      }

      document.getElementById('favToggle').addEventListener('click', () => {
        const panel = document.getElementById('favsPanel');
        panel.classList.toggle('open');
        renderFavsPanel();
      });
      document.getElementById('closeFavs').addEventListener('click', () => {
        document.getElementById('favsPanel').classList.remove('open');
      });

      function loadQuiz() {
        const q = QUIZ_DATA[quizIndex % QUIZ_DATA.length];
        document.getElementById('quizQ').textContent = q.question;
        document.getElementById('quizInput').value = '';
        document.getElementById('quizFeedback').textContent = '';
        document.getElementById('quizFeedback').className = 'quiz-feedback';
      }

      document.getElementById('quizBtn').addEventListener('click', () => {
        const input = document.getElementById('quizInput').value.trim().toLowerCase();
        const q = QUIZ_DATA[quizIndex % QUIZ_DATA.length];
        const fb = document.getElementById('quizFeedback');
        if (!input) { fb.textContent = 'Type an answer!'; return; }
        const correct = q.answers.some(a => a.toLowerCase() === input);
        if (correct) {
          fb.textContent = '✅ Correct! 🎉';
          fb.className = 'quiz-feedback correct';
        } else {
          fb.textContent = `❌ Not quite. Answer: ${q.answers[0]}`;
          fb.className = 'quiz-feedback wrong';
        }
        quizIndex = (quizIndex + 1) % QUIZ_DATA.length;
        setTimeout(loadQuiz, 2000);
      });

      document.getElementById('quizInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('quizBtn').click();
      });

      document.querySelectorAll('.stab').forEach(t => {
        t.addEventListener('click', () => {
          document.querySelectorAll('.stab').forEach(x => x.classList.remove('sel'));
          t.classList.add('sel');
          currentSrc = t.dataset.src;
          page = 1;
          hasMore = true;
          currentQuery = document.getElementById('q').value.trim();
          loadMore(currentSrc, currentCat, currentQuery, page, false);
        });
      });

      document.querySelectorAll('.cat-chip').forEach(c => {
        c.addEventListener('click', () => {
          document.querySelectorAll('.cat-chip').forEach(x => x.classList.remove('sel'));
          c.classList.add('sel');
          currentCat = c.dataset.cat;
          page = 1;
          hasMore = true;
          currentQuery = document.getElementById('q').value.trim();
          loadMore(currentSrc, currentCat, currentQuery, page, false);
        });
      });

      const qEl = document.getElementById('q');
      const qClear = document.getElementById('qClear');
      qEl.addEventListener('input', e => {
        const v = e.target.value;
        qClear.style.display = v ? 'block' : 'none';
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
          page = 1;
          hasMore = true;
          currentQuery = v.trim();
          if (v.length >= 2 || !v) {
            loadMore(currentSrc, currentCat, currentQuery, page, false);
          }
        }, 500);
      });
      qClear.addEventListener('click', () => {
        qEl.value = '';
        qClear.style.display = 'none';
        page = 1;
        hasMore = true;
        currentQuery = '';
        loadMore(currentSrc, currentCat, '', page, false);
      });

      let dark = false;
      document.getElementById('themeToggle').addEventListener('click', () => {
        dark = !dark;
        const root = document.documentElement.style;
        if (dark) {
          root.setProperty('--bg', '#1e1c2b');
          root.setProperty('--card-bg', '#2a2740');
          root.setProperty('--shadow', '12px 12px 24px #131122, -12px -12px 24px #3d385a');
          root.setProperty('--shadow-inset', 'inset 4px 4px 10px #131122, inset -4px -4px 10px #3d385a');
          root.setProperty('--shadow-soft', '6px 6px 14px #131122, -6px -6px 14px #3d385a');
          root.setProperty('--ink', '#eeecff');
          root.setProperty('--ink2', '#b8b0e0');
          root.setProperty('--muted', '#8f8bb0');
          root.setProperty('--white', '#f0eef7');
          document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
        } else {
          root.setProperty('--bg', '#eae8f0');
          root.setProperty('--card-bg', '#f0eef7');
          root.setProperty('--shadow', '12px 12px 24px #b8b4c4, -12px -12px 24px #ffffff');
          root.setProperty('--shadow-inset', 'inset 4px 4px 10px #b8b4c4, inset -4px -4px 10px #ffffff');
          root.setProperty('--shadow-soft', '6px 6px 14px #b8b4c4, -6px -6px 14px #ffffff');
          root.setProperty('--ink', '#201e3a');
          root.setProperty('--ink2', '#49446b');
          root.setProperty('--muted', '#7a7799');
          root.setProperty('--white', '#f6f4fe');
          document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';
        }
      });

      loadMore('all', 'trending', '', 1, false);
      loadQuiz();
      updateFavBadge();

      const observerInit = new MutationObserver(() => {
        setupInfiniteScroll();
      });
      observerInit.observe(document.getElementById('main'), { childList: true, subtree: true });
