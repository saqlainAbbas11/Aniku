<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0" />
  <title>Aniku · Creator Saqlain Abbas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --bg: #eae8f0;
      --card-bg: #f0eef7;
      --shadow: 12px 12px 24px #b8b4c4, -12px -12px 24px #ffffff;
      --shadow-inset: inset 4px 4px 10px #b8b4c4, inset -4px -4px 10px #ffffff;
      --shadow-soft: 6px 6px 14px #b8b4c4, -6px -6px 14px #ffffff;
      --p: #8b6bff;
      --p2: #b19eff;
      --pink: #ff5e7a;
      --mint: #4d6bd9;
      --sky: #6bb6ff;
      --peach: #ff9f6b;
      --lemon: #f5d000;
      --ink: #201e3a;
      --ink2: #49446b;
      --muted: #7a7799;
      --white: #f6f4fe;
      --r: 24px;
      --r2: 16px;
      --rs: 12px;
      --max-w: 600px;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 14px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .app {
      max-width: var(--max-w);
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 30px;
    }
    .neu {
      background: var(--card-bg);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .neu-inset {
      background: var(--card-bg);
      border-radius: var(--r2);
      box-shadow: var(--shadow-inset);
    }
    .neu-soft {
      background: var(--card-bg);
      border-radius: var(--r2);
      box-shadow: var(--shadow-soft);
    }
    .neu-pressed {
      box-shadow: var(--shadow-inset);
      transform: scale(0.98);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      gap: 8px;
      flex-wrap: nowrap;
    }
    .wordmark {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -1.5px;
      color: var(--ink);
      flex-shrink: 0;
    }
    .wordmark em {
      font-style: normal;
      background: linear-gradient(145deg, #8b6bff, #b19eff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sam {
      font-style: normal;
      background: linear-gradient(145deg, #df314e, #8f7900, #4dd9b3, #2064a8, #8b6bff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      background-size: 300% 300%;
      animation: shimmer 3s ease infinite;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
      display: inline-block;
    }
    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .sam::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(145deg, #8b6bff, #b19eff);
      transition: width 0.3s ease;
      border-radius: 2px;
    }
    .sam:hover::after {
      width: 100%;
    }
    .creator-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px 4px 8px;
      background: var(--card-bg);
      border-radius: 40px;
      box-shadow: var(--shadow-soft);
      font-size: 11px;
      font-weight: 600;
      color: var(--ink2);
      transition: 0.2s;
      position: relative;
      cursor: default;
      flex-shrink: 1;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .creator-wrap:hover {
      box-shadow: var(--shadow-inset);
    }
    .creator-wrap i {
      font-size: 11px;
      color: var(--mint);
      opacity: 0.8;
      flex-shrink: 0;
    }
    .topbar-icons {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--card-bg);
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 17px;
      color: var(--ink2);
      transition: 0.15s;
      position: relative;
      border: none;
      flex-shrink: 0;
    }
    .icon-btn:active {
      box-shadow: var(--shadow-inset);
      transform: scale(0.94);
    }
    .badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: var(--pink);
      color: white;
      font-size: 9px;
      font-weight: 800;
      padding: 1px 6px;
      border-radius: 999px;
      display: none;
    }
    .badge.show {
      display: inline-block;
    }
    .search-box {
      position: relative;
      padding: 4px;
      background: var(--card-bg);
      border-radius: 60px;
      box-shadow: var(--shadow-inset);
    }
    .search-box input {
      width: 100%;
      padding: 14px 18px 14px 50px;
      border: none;
      border-radius: 60px;
      background: var(--card-bg);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: var(--ink);
      outline: none;
      box-shadow: var(--shadow-soft);
      transition: 0.2s;
    }
    .search-box input:focus {
      box-shadow: var(--shadow-inset);
    }
    .search-box i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--p);
      font-size: 18px;
      pointer-events: none;
    }
    .search-clear {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      display: none;
      font-weight: 700;
    }
    .source-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 2px 8px;
      scrollbar-width: none;
    }
    .source-tabs::-webkit-scrollbar {
      display: none;
    }
    .stab {
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      background: var(--card-bg);
      transition: all 0.15s;
      flex-shrink: 0;
      color: var(--ink2);
      border: none;
    }
    .stab.sel {
      box-shadow: var(--shadow-inset);
      color: var(--p);
    }
    .stab:active {
      transform: scale(0.94);
    }
    .cat-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 6px;
      scrollbar-width: none;
    }
    .cat-row::-webkit-scrollbar {
      display: none;
    }
    .cat-chip {
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      background: var(--card-bg);
      transition: 0.15s;
      flex-shrink: 0;
      color: var(--ink2);
      border: none;
    }
    .cat-chip.sel {
      box-shadow: var(--shadow-inset);
      color: var(--p);
    }
    .cat-chip:active {
      transform: scale(0.94);
    }
    
    /* Filter Button & Panel */
    .filter-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: var(--card-bg);
      box-shadow: var(--shadow-soft);
      color: var(--ink2);
      border: none;
      transition: 0.2s;
      width: fit-content;
    }
    .filter-toggle:hover {
      box-shadow: var(--shadow-inset);
    }
    .filter-toggle.active {
      box-shadow: var(--shadow-inset);
      color: var(--p);
    }
    .filter-toggle i {
      font-size: 14px;
    }
    
    .filter-panel {
      background: var(--card-bg);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 16px;
      animation: slideDown 0.3s ease;
    }
    .filter-panel.open {
      display: flex;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .filter-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      min-width: 60px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .filter-select, .filter-input {
      padding: 8px 14px;
      border: none;
      border-radius: 40px;
      background: var(--card-bg);
      box-shadow: var(--shadow-inset);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      color: var(--ink);
      outline: none;
      min-width: 100px;
      transition: 0.2s;
    }
    .filter-select:focus, .filter-input:focus {
      box-shadow: var(--shadow);
    }
    .filter-select option {
      background: var(--card-bg);
      color: var(--ink);
    }
    .filter-apply {
      padding: 8px 24px;
      border: none;
      border-radius: 40px;
      background: var(--p);
      color: white;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: 0.15s;
      font-family: inherit;
    }
    .filter-apply:active {
      transform: scale(0.96);
      box-shadow: var(--shadow-inset);
    }
    .filter-reset {
      padding: 8px 18px;
      border: none;
      border-radius: 40px;
      background: var(--card-bg);
      box-shadow: var(--shadow-soft);
      color: var(--ink2);
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: 0.15s;
      font-family: inherit;
    }
    .filter-reset:active {
      transform: scale(0.96);
      box-shadow: var(--shadow-inset);
    }
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-tag {
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(139, 107, 255, 0.15);
      color: var(--p);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .filter-tag .remove {
      cursor: pointer;
      font-size: 12px;
      opacity: 0.6;
    }
    .filter-tag .remove:hover {
      opacity: 1;
    }

    .sec-hdr {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 4px;
      margin-top: 4px;
    }
    .sec-label {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sec-label .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      background: var(--p);
    }
    .bento {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 4px;
    }
    .feat-card {
      border-radius: var(--r);
      background: var(--card-bg);
      box-shadow: var(--shadow);
      overflow: hidden;
      cursor: pointer;
      transition: 0.18s;
      margin-bottom: 6px;
    }
    .feat-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-inset);
    }
    .feat-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: #d9d3e8;
    }
    .feat-overlay {
      position: relative;
      padding: 14px 16px 18px;
      background: linear-gradient(135deg, rgba(240, 238, 247, 0.7), rgba(240, 238, 247, 0.95));
      backdrop-filter: blur(2px);
    }
    .feat-src-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 9px;
      font-weight: 800;
      background: var(--p);
      color: white;
      margin-bottom: 6px;
    }
    .feat-score {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 800;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.5);
      padding: 3px 12px;
      border-radius: 40px;
      float: right;
    }
    .feat-title {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.2;
      margin: 6px 0 4px;
    }
    .feat-meta {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink2);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .feat-tags {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .feat-tag {
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 9px;
      font-weight: 800;
      background: rgba(139, 107, 255, 0.15);
      color: var(--p);
    }
    .a-card {
      border-radius: var(--r2);
      background: var(--card-bg);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      cursor: pointer;
      transition: 0.15s;
      margin-bottom: 4px;
    }
    .a-card:active {
      transform: scale(0.96);
      box-shadow: var(--shadow-inset);
    }
    .a-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      background: #d9d3e8;
    }
    .a-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .a-score-pill {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(2px);
      border-radius: 40px;
      padding: 3px 10px;
      font-size: 10px;
      font-weight: 800;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .a-fav {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(2px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: 0.15s;
      color: var(--muted);
      border: none;
    }
    .a-fav.active {
      color: #ff2d55;
    }
    .a-fav:active {
      transform: scale(1.25);
    }
    .a-body {
      padding: 10px 12px 12px;
    }
    .a-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .a-sub {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .sdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .row-card {
      border-radius: var(--r2);
      background: var(--card-bg);
      box-shadow: var(--shadow-soft);
      display: flex;
      overflow: hidden;
      cursor: pointer;
      transition: 0.15s;
      margin-bottom: 6px;
    }
    .row-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-inset);
    }
    .row-img {
      width: 70px;
      flex-shrink: 0;
      object-fit: cover;
      background: #d9d3e8;
    }
    .row-body {
      padding: 12px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .row-title {
      font-size: 14px;
      font-weight: 700;
    }
    .row-meta {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }
    .row-score {
      font-size: 12px;
      font-weight: 800;
      color: var(--p);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .row-src {
      font-size: 9px;
      font-weight: 800;
      padding: 2px 10px;
      border-radius: 40px;
      background: var(--p3);
      color: var(--p);
    }
    .detail {
      display: none;
      flex-direction: column;
      gap: 16px;
    }
    .detail.open {
      display: flex;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      padding: 10px 16px;
      border-radius: 60px;
      background: var(--card-bg);
      box-shadow: var(--shadow-soft);
      width: fit-content;
      transition: 0.15s;
      border: none;
    }
    .back-btn:active {
      box-shadow: var(--shadow-inset);
      transform: scale(0.96);
    }
    .det-hero {
      border-radius: var(--r);
      background: var(--card-bg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .det-cover {
      width: 100%;
      height: 210px;
      object-fit: cover;
      background: #d9d3e8;
      cursor: pointer;
      transition: 0.3s ease;
    }
    .det-cover:hover {
      opacity: 0.92;
      transform: scale(1.01);
    }
    .det-cover-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: var(--r) var(--r) 0 0;
    }
    .det-cover-wrapper .enlarge-badge {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      color: white;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      z-index: 5;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      letter-spacing: 0.5px;
    }
    .det-cover-wrapper:hover .enlarge-badge {
      opacity: 1;
      transform: translateY(0);
    }
    .det-body {
      padding: 18px 18px 20px;
    }
    .det-title {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.2;
    }
    .det-eng {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-top: 2px;
    }
    .det-meta-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0;
    }
    .dmc {
      padding: 5px 14px;
      border-radius: 40px;
      font-size: 10px;
      font-weight: 800;
      background: rgba(139, 107, 255, 0.12);
      color: var(--p);
    }
    .det-syn {
      font-size: 14px;
      line-height: 1.7;
      color: var(--ink2);
      font-weight: 500;
      max-height: 270px;
      overflow-y: auto;
    }
    .det-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px;
    }
    .ds {
      padding: 14px 16px;
      border-radius: var(--r2);
      background: var(--card-bg);
      box-shadow: var(--shadow-soft);
    }
    .ds-v {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .ds-l {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-top: 3px;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 40px 16px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--card-bg);
      box-shadow: var(--shadow-inset);
      animation: spin 0.9s linear infinite;
      border: 4px solid transparent;
      border-top-color: var(--p);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .ld-txt {
      font-weight: 700;
      color: var(--muted);
    }
    .err-box {
      padding: 16px;
      border-radius: var(--r2);
      background: #fce9f0;
      box-shadow: var(--shadow-inset);
      color: #b0004a;
      font-weight: 600;
      text-align: center;
    }
    .quiz-card {
      background: var(--card-bg);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .quiz-q {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.4;
    }
    .quiz-input {
      padding: 12px 16px;
      border: none;
      border-radius: 60px;
      background: var(--card-bg);
      box-shadow: var(--shadow-inset);
      font-size: 14px;
      font-weight: 600;

      ];

      let favs = new Set();

      let currentCat = 'trending';
      let searchDebounce;
      let allData = { jikan: [], anilist: [], kitsu: [], mangadex: [] };
      let page = 1;
      let isLoading = false;
      let hasMore = true;
      let currentQuery = '';
      let quizIndex = 0;
      
      // Filter state
      let filters = {
        year: '',
        genre: '',
        status: '',
        rating: ''
      };

      const KITSU_H = { 'Accept': 'application/vnd.api+json', 'Content-Type': 'application/vnd.api+json' };
      const SRC_COLORS = {
        jikan: { bg: '#f0e2d4', color: '#7c2d12', dot: '#ff6b35' },
        anilist: { bg: '#d9e6f5', color: '#1a4a6b', dot: '#2e86de' },
        kitsu: { bg: '#c8f0e6', color: '#065f46', dot: '#10b981' },
        mangadex: { bg: '#f0d9e0', color: '#7c2d46', dot: '#e74c8b' }
      };
      const PALETTES = [
        { bg: '#ede5ff', txt: '#4a1d96' },
        { bg: '#c8f7ec', txt: '#065f46' },
        { bg: '#ffd6e8', txt: '#7c2d46' },
        { bg: '#d6eeff', txt: '#1a4a6b' },
        { bg: '#ffe8d6', txt: '#7c2d12' },
        { bg: '#fffbd6', txt: '#78350f' }
      ];

      function pal(i) { return PALETTES[i % PALETTES.length]; }
      function scoreStr(v) { return v != null ? parseFloat(v).toFixed(1) : '—'; }
      function truncate(s, n = 140) { return s && s.length > n ? s.slice(0, n) + '…' : s || 'No synopsis.'; }

      function updateFavBadge() {
        const b = document.getElementById('favBadge');
        const n = favs.size;
        b.textContent = n;
        b.classList.toggle('show', n > 0);
        renderFavsPanel();
      }

      // Filter functions
      function getFilteredItems(items) {
        let filtered = [...items];
        
        if (filters.year) {
          const yearFilter = filters.year;
          if (yearFilter.includes('-')) {
            // Range filter
            const [start, end] = yearFilter.split('-').map(Number);
            filtered = filtered.filter(item => {
              const year = item.year;
              return year && year >= start && year <= end;
            });
          } else {
            filtered = filtered.filter(item => item.year === parseInt(yearFilter));
          }
        }
        
        if (filters.genre) {
          filtered = filtered.filter(item => {
            const genres = item.genres || [];
            return genres.some(g => g.toLowerCase().includes(filters.genre.toLowerCase()));
          });
        }
        
        if (filters.status) {
          const statusMap = {
            'airing': ['airing', 'current', 'Airing'],
            'finished': ['finished', 'Finished', 'complete'],
            'upcoming': ['upcoming', 'not_yet_released', 'Upcoming']
          };
          const validStatuses = statusMap[filters.status] || [];
          filtered = filtered.filter(item => {
            const status = (item.status || '').toLowerCase();
            return validStatuses.some(s => status === s.toLowerCase());
          });
        }
        
        if (filters.rating) {
          const minRating = parseInt(filters.rating);
          filtered = filtered.filter(item => {
            const score = item.score;
            return score != null && score >= minRating;
          });
        }
        
        return filtered;
      }

      function getFilterParams() {
        const params = {};
        if (filters.year) {
          if (filters.year.includes('-')) {
            const [start, end] = filters.year.split('-').map(Number);
            params.yearStart = start;
            params.yearEnd = end;
          } else {
            params.year = parseInt(filters.year);
          }
        }
        if (filters.genre) params.genre = filters.genre;
        if (filters.status) params.status = filters.status;
        if (filters.rating) params.minScore = parseInt(filters.rating);
        return params;
      }

      function updateFilterTags() {
        const container = document.getElementById('filterTags');
        const tags = [];
        
        if (filters.year) tags.push({ key: 'year', label: `Year: ${filters.year}` });
        if (filters.genre) tags.push({ key: 'genre', label: `Genre: ${filters.genre}` });
        if (filters.status) tags.push({ key: 'status', label: `Status: ${filters.status}` });
        if (filters.rating) tags.push({ key: 'rating', label: `Rating: ${filters.rating}+` });
        
        if (tags.length === 0) {
          container.innerHTML = '';
          return;
        }
        
        container.innerHTML = tags.map(tag => `
          <span class="filter-tag">
            ${tag.label}
            <span class="remove" data-key="${tag.key}">&times;</span>
          </span>
        `).join('');
        
        container.querySelectorAll('.remove').forEach(el => {
          el.addEventListener('click', () => {
            const key = el.dataset.key;
            filters[key] = '';
            document.getElementById(`filter${key.charAt(0).toUpperCase() + key.slice(1)}`).value = '';
            updateFilterTags();
            applyFiltersAndReload();
          });
        });
      }

      function applyFiltersAndReload() {
        page = 1;
        hasMore = true;
        loadMore(currentSrc, currentCat, currentQuery, page, false);
      }

      // API fetch functions
      async function fetchJikan(mode, q, page) {
        try {
          const filterParams = getFilterParams();
          let url;
          if (q) {
            url = `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=12&page=${page}`;
          } else if (mode === 'airing') {
            url = `https://api.jikan.moe/v4/top/anime?filter=airing&limit=12&page=${page}`;
          } else if (mode === 'top') {
            url = `https://api.jikan.moe/v4/top/anime?limit=12&page=${page}`;
          } else if (mode === 'upcoming') {
            url = `https://api.jikan.moe/v4/top/anime?filter=upcoming&limit=12&page=${page}`;
          } else if (mode === 'manga') {
            url = `https://api.jikan.moe/v4/top/manga?limit=12&page=${page}`;
          } else {
            url = `https://api.jikan.moe/v4/top/anime?limit=12&page=${page}`;
          }
          
          // Add genre filter if specified
          if (filters.genre && !q) {
            const genreMap = {
              'action': 1, 'adventure': 2, 'comedy': 4, 'drama': 8, 'fantasy': 10,
              'horror': 14, 'mystery': 7, 'romance': 22, 'sci-fi': 24,
              'slice of life': 36, 'sports': 30, 'thriller': 41
            };
            const genreId = genreMap[filters.genre.toLowerCase()];
            if (genreId) {
              url += `&genres=${genreId}`;
            }
          }
          
          const res = await fetch(url);
          const j = await res.json();
          let items = (j.data || []).map(a => ({
            id: 'jikan_' + a.mal_id,
            src: 'jikan',
            rawId: a.mal_id,
            title: a.title,
            titleEn: a.title_english || '',
            img: a.images?.jpg?.image_url || '',
            imgLg: a.images?.jpg?.large_image_url || '',
            score: a.score ? a.score * 10 : null,
            eps: a.episodes,
            status: a.status,
            type: a.type,
            year: a.year || a.aired?.prop?.from?.year,
            genres: (a.genres || []).map(g => g.name).slice(0, 5),
            synopsis: a.synopsis,
            rank: a.rank,
            members: a.members,
            isManga: mode === 'manga' || a.type === 'Manga'
          }));
          
          // Client-side filtering for year range that Jikan doesn't support directly
          if (filterParams.yearStart && filterParams.yearEnd) {
            items = items.filter(item => {
              const year = item.year;
              return year && year >= filterParams.yearStart && year <= filterParams.yearEnd;
            });
          }
          
          if (filterParams.year && !filterParams.yearStart) {
            items = items.filter(item => item.year === filterParams.year);
          }
          
          if (filterParams.minScore) {
            items = items.filter(item => item.score != null && item.score >= filterParams.minScore);
          }
          
          if (filterParams.status) {
            const statusMap = {
              'airing': ['airing', 'currently airing'],
              'finished': ['finished', 'complete'],
              'upcoming': ['upcoming', 'not yet aired']
            };
            const validStatuses = statusMap[filterParams.status] || [];
            items = items.filter(item => {
              const status = (item.status || '').toLowerCase();
              return validStatuses.some(s => status.includes(s));
            });
          }
          
          return items;
        } catch { return []; }
      }

      async function fetchAniList(mode, q, page) {
        try {
          const isSearch = !!q;
          const perPage = 12;
          const filterParams = getFilterParams();
          
          let sort = 'TRENDING_DESC';
          let type = 'ANIME';
          let statusFilter = '';
          
          if (mode === 'manga') {
            type = 'MANGA';
            sort = 'POPULARITY_DESC';
          } else if (mode === 'top') {
            sort = 'SCORE_DESC';
          } else if (mode === 'upcoming') {
            statusFilter = 'status: NOT_YET_RELEASED,';
          } else if (mode === 'airing') {
            statusFilter = 'status: RELEASING,';
          }
          
          let genreFilter = '';
          if (filters.genre) {
            genreFilter = `genre: "${filters.genre}",`;
          }
          
          let yearFilter = '';
          if (filters.year) {
            if (filters.year.includes('-')) {
              const [start, end] = filters.year.split('-').map(Number);
              yearFilter = `startDate_greater: ${start}, startDate_lesser: ${end},`;
            } else {
              yearFilter = `startDate: ${filters.year},`;
            }
          }
          
          const gql = isSearch ?
            `query($s:String,$page:Int){Page(page:$page,perPage:${perPage}){media(search:$s,type:${type},sort:POPULARITY_DESC){id title{romaji english}coverImage{large}averageScore episodes status startDate{year}genres description}}}` :
            `query($page:Int){Page(page:$page,perPage:${perPage}){media(type:${type},sort:${sort},${genreFilter}${yearFilter}${statusFilter}){id title{romaji english}coverImage{large}averageScore episodes status startDate{year}genres description}}}`;
          
          const res = await fetch('https://graphql.anilist.co', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: gql, variables: isSearch ? { s: q, page } : { page } })
          });
          const j = await res.json();
          const items = j.data?.Page?.media || [];
          
          let results = items.map(a => ({
            id: 'anilist_' + a.id,
            src: 'anilist',
            rawId: a.id,
            title: a.title.romaji,
            titleEn: a.title.english || '',
            img: a.coverImage?.large || '',
            imgLg: a.coverImage?.large || '',
            score: a.averageScore,
            eps: a.episodes || a.chapters,
            status: a.status,
            year: a.startDate?.year,
            genres: (a.genres || []).slice(0, 5),
            synopsis: a.description?.replace(/<[^>]+>/g, ''),
            isManga: mode === 'manga'
          }));
          
          // Client-side rating filter
          if (filterParams.minScore) {
            results = results.filter(item => item.score != null && item.score >= filterParams.minScore);
          }
          
          if (filterParams.status && !isSearch) {
            const statusMap = {
              'airing': ['RELEASING'],
              'finished': ['FINISHED'],
              'upcoming': ['NOT_YET_RELEASED']
            };
            const validStatuses = statusMap[filterParams.status] || [];
            results = results.filter(item => {
              const status = (item.status || '').toUpperCase();
              return validStatuses.includes(status);
            });
          }
          
          return results;
        } catch { return []; }
      }

      async function fetchKitsu(mode, q, page) {
        try {
          const limit = 12;
          const offset = (page - 1) * limit;
          const filterParams = getFilterParams();
          
          let url;
          let statusFilter = '';
          let sort = '-userCount';
          
          if (filters.status) {
            const statusMap = {
              'airing': 'current',
              'finished': 'finished',
              'upcoming': 'upcoming'
            };
            const kitsuStatus = statusMap[filters.status];
            if (kitsuStatus) statusFilter = `filter[status]=${kitsuStatus}&`;
          }
          
          if (filters.year) {
            if (filters.year.includes('-')) {
              const [start, end] = filters.year.split('-').map(Number);
              // Kitsu doesn't support year range filtering directly
            } else {
              // Kitsu doesn't support year filtering directly
            }
          }
          
          if (q) {
            url = `https://kitsu.io/api/edge/anime?filter[text]=${encodeURIComponent(q)}&page[limit]=${limit}&page[offset]=${offset}&fields[anime]=canonicalTitle,titles,posterImage,averageRating,showType,episodeCount,status,startDate,synopsis,userCount,favoritesCount`;
          } else if (mode === 'manga') {
            url = `https://kitsu.io/api/edge/manga?sort=-userCount&page[limit]=${limit}&page[offset]=${offset}&fields[manga]=canonicalTitle,titles,posterImage,averageRating,chapterCount,status,startDate,synopsis,userCount,favoritesCount`;
          } else if (mode === 'top') {
            url = `https://kitsu.io/api/edge/anime?sort=-averageRating&page[limit]=${limit}&page[offset]=${offset}&${statusFilter}fields[anime]=canonicalTitle,titles,posterImage,averageRating,showType,episodeCount,status,startDate,synopsis,userCount,favoritesCount`;
          } else {
            url = `https://kitsu.io/api/edge/anime?sort=-userCount&page[limit]=${limit}&page[offset]=${offset}&${statusFilter}fields[anime]=canonicalTitle,titles,posterImage,averageRating,showType,episodeCount,status,startDate,synopsis,userCount,favoritesCount`;
          }

          const res = await fetch(url, { headers: KITSU_H });
          const j = await res.json();

          if (!j.data || !j.data.length) return [];

          let results = j.data.map(a => {
            const attr = a.attributes || {};
            let statusDisplay = attr.status || 'unknown';
            if (statusDisplay === 'current') statusDisplay = 'Airing';
            else if (statusDisplay === 'finished') statusDisplay = 'Finished';
            else if (statusDisplay === 'upcoming') statusDisplay = 'Upcoming';

            return {
              id: `kitsu_${a.id}`,
              src: 'kitsu',
              rawId: a.id,
              title: attr.canonicalTitle || attr.titles?.en || attr.titles?.en_jp || 'Unknown Title',
              titleEn: attr.titles?.en || attr.titles?.en_us || '',
              img: attr.posterImage?.small || attr.posterImage?.medium || attr.posterImage?.tiny || '',
              imgLg: attr.posterImage?.large || attr.posterImage?.original || attr.posterImage?.medium || '',
              score: attr.averageRating ? parseFloat(attr.averageRating) : null,
              eps: attr.episodeCount || attr.chapterCount || null,
              status: statusDisplay,
              type: attr.showType || 'TV',
              year: attr.startDate ? new Date(attr.startDate).getFullYear() : null,
              genres: [],
              synopsis: attr.synopsis || 'No synopsis available.',
              isManga: mode === 'manga',
              members: attr.userCount || null,
              popularity: attr.favoritesCount || null
            };
          });
          
          // Client-side filtering for Kitsu
          if (filterParams.year && !filterParams.yearStart) {
            results = results.filter(item => item.year === filterParams.year);
          }
          if (filterParams.yearStart && filterParams.yearEnd) {
            results = results.filter(item => {
              const year = item.year;
              return year && year >= filterParams.yearStart && year <= filterParams.yearEnd;
            });
          }
          if (filterParams.minScore) {
            results = results.filter(item => item.score != null && item.score >= filterParams.minScore);
          }
          
          return results;
        } catch (error) {
          console.error('Kitsu fetch error:', error);
          return [];
        }
      }

      async function fetchMangaDex(q, page) {
        try {
          const limit = 12;
          const offset = (page - 1) * limit;
          let url = q ?
            `https://api.mangadex.org/manga?title=${encodeURIComponent(q)}&limit=${limit}&offset=${offset}&includes[]=cover_art&order[relevance]=desc` :
            `https://api.mangadex.org/manga?limit=${limit}&offset=${offset}&includes[]=cover_art&order[followedCount]=desc&status[]=ongoing`;
          const res = await fetch(url);
          const j = await res.json();
          return (j.data || []).map(m => {
            const cover = m.relationships?.find(r => r.type === 'cover_art');
            const fn = cover?.attributes?.fileName;
            const img = fn ? `https://uploads.mangadex.org/covers/${m.id}/${fn}.256.jpg` : '';
            const title = m.attributes.title?.en || m.attributes.title?.ja || Object.values(m.attributes.title || {})[0] || '';
            return {
              id: 'mdex_' + m.id,
              src: 'mangadex',
              rawId: m.id,
              title,
              titleEn: '',
              img,
              imgLg: img,
              score: null,
              eps: m.attributes.lastChapter,
              status: m.attributes.status,
              year: m.attributes.year,
              genres: (m.attributes.tags || []).filter(t => t.attributes.group === 'genre').map(t => t.attributes.name.en).slice(0, 5),
              synopsis: m.attributes.description?.en || '',
              isManga: true
            };
          });
        } catch { return []; }
      }

      async function loadMore(src, cat, q, pageNum, append = true) {
        if (isLoading) return;
        isLoading = true;
        const main = document.getElementById('main');
        if (!append) {
          main.innerHTML = '';
          page = 1;
          hasMore = true;
        }
        const loader = document.createElement('div');
        loader.className = 'infinite-trigger';
        loader.id = 'infiniteLoader';
        loader.textContent = 'Loading more…';
        main.appendChild(loader);

        const isManga = cat === 'manga';
        let items = [];
        
        if (src === 'all' || src === 'jikan') {
          const d = await fetchJikan(cat, q, pageNum);
          items = items.concat(d);
        }
        if (src === 'all' || src === 'anilist') {
          const d = await fetchAniList(cat, q, pageNum);
          items = items.concat(d);
        }
        if (src === 'all' || src === 'kitsu') {
          const d = await fetchKitsu(cat, q, pageNum);
          items = items.concat(d);
        }
        if (isManga || src === 'mangadex') {
          const d = await fetchMangaDex(q, pageNum);
          items = items.concat(d);
        }

        // Apply client-side filtering
        if (items.length > 0) {
          items = getFilteredItems(items);
        }

        const l = document.getElementById('infiniteLoader');
        if (l) l.remove();

        if (!items.length) {
          hasMore = false;
          const endMsg = document.createElement('div');
          endMsg.className = 'infinite-trigger';
          endMsg.textContent = '✨ No results found with current filters';
          main.appendChild(endMsg);
          isLoading = false;
          return;
        }

        const seen = new Set();
        const unique = items.filter(a => {
          if (seen.has(a.id)) return false;
          seen.add(a.id);
          return true;
        });

        if (!append) main.innerHTML = '';

        renderItems(unique, main, append);
        unique.forEach(a => { allData[a.src] = allData[a.src] || [];
          allData[a.src].push(a); });

        isLoading = false;
        if (unique.length < 12) hasMore = false;
        setupInfiniteScroll();
      }

                </div>

                  <div class="a-sub"><span class="sdot" style="background:${a.status==='finished'||a.status==='FINISHED'?'#6b7280':a.status==='upcoming'||a.status==='NOT_YET_RELEASED'?'#f59e0b':'#10b981'};"></span>${statusTxt}</div>

      let observer = null;

      function setupInfiniteScroll() {
        if (observer) observer.disconnect();
        const trigger = document.getElementById('infiniteTrigger');
        if (!trigger) return;
        observer = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting && hasMore && !isLoading) {
            page++;
            loadMore(currentSrc, currentCat, currentQuery, page);
          }
        }, { rootMargin: '100px' });
        observer.observe(trigger);
      }

        applyFiltersAndReload();
        // Close panel on mobile
        if (window.innerWidth < 720) {
          filterPanel.classList.remove('open');
          filterToggle.classList.remove('active');
        }
      });

      document.getElementById('filterReset').addEventListener('click', () => {
        document.getElementById('filterYear').value = '';
        document.getElementById('filterGenre').value = '';
        document.getElementById('filterStatus').value = '';
        document.getElementById('filterRating').value = '';
        filters = { year: '', genre: '', status: '', rating: '' };
        updateFilterTags();
        applyFiltersAndReload();
      });

      function loadQuiz() {
        const q = QUIZ_DATA[quizIndex % QUIZ_DATA.length];
        document.getElementById('quizQ').textContent = q.question;
        document.getElementById('quizInput').value = '';
        document.getElementById('quizFeedback').textContent = '';
        document.getElementById('quizFeedback').className = 'quiz-feedback';
      }

      document.getElementById('quizBtn').addEventListener('click', () => {
        const input = document.getElementById('quizInput').value.trim().toLowerCase();
        const q = QUIZ_DATA[quizIndex % QUIZ_DATA.length];
        const fb = document.getElementById('quizFeedback');
        if (!input) { fb.textContent = 'Type an answer!'; return; }
        const correct = q.answers.some(a => a.toLowerCase() === input);
        if (correct) {
          fb.textContent = '✅ Correct! 🎉';
          fb.className = 'quiz-feedback correct';
        } else {
          fb.textContent = `❌ Not quite. Answer: ${q.answers[0]}`;
          fb.className = 'quiz-feedback wrong';
        }
        quizIndex = (quizIndex + 1) % QUIZ_DATA.length;
        setTimeout(loadQuiz, 2000);
      });

      document.getElementById('quizInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('quizBtn').click();
      });

      // Source tabs
      document.querySelectorAll('.stab').forEach(t => {
        t.addEventListener('click', () => {
          document.querySelectorAll('.stab').forEach(x => x.classList.remove('sel'));
          t.classList.add('sel');
          currentSrc = t.dataset.src;
          page = 1;
          hasMore = true;
          currentQuery = document.getElementById('q').value.trim();
          loadMore(currentSrc, currentCat, currentQuery, page, false);
        });
      });

      // Category chips
      document.querySelectorAll('.cat-chip').forEach(c => {
        c.addEventListener('click', () => {
          document.querySelectorAll('.cat-chip').forEach(x => x.classList.remove('sel'));
          c.classList.add('sel');
          currentCat = c.dataset.cat;
          page = 1;
          hasMore = true;
          currentQuery = document.getElementById('q').value.trim();
          loadMore(currentSrc, currentCat, currentQuery, page, false);
        });
      });

      const qEl = document.getElementById('q');
      const qClear = document.getElementById('qClear');
      qEl.addEventListener('input', e => {
        const v = e.target.value;
        qClear.style.display = v ? 'block' : 'none';
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
          page = 1;
          hasMore = true;
          currentQuery = v.trim();
          if (v.length >= 2 || !v) {
            loadMore(currentSrc, currentCat, currentQuery, page, false);
          }
        }, 500);
      });
      qClear.addEventListener('click', () => {
        qEl.value = '';
        qClear.style.display = 'none';
        page = 1;
        hasMore = true;
        currentQuery = '';
        loadMore(currentSrc, currentCat, '', page, false);
      });

      let dark = false;
      document.getElementById('themeToggle').addEventListener('click', () => {
        dark = !dark;
        const root = document.documentElement.style;
        if (dark) {
          root.setProperty('--bg', '#1e1c2b');
          root.setProperty('--card-bg', '#2a2740');
          root.setProperty('--shadow', '12px 12px 24px #131122, -12px -12px 24px #3d385a');
          root.setProperty('--shadow-inset', 'inset 4px 4px 10px #131122, inset -4px -4px 10px #3d385a');
          root.setProperty('--shadow-soft', '6px 6px 14px #131122, -6px -6px 14px #3d385a');
          root.setProperty('--ink', '#eeecff');
          root.setProperty('--ink2', '#b8b0e0');
          root.setProperty('--muted', '#8f8bb0');
          root.setProperty('--white', '#f0eef7');
          document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
        } else {
          root.setProperty('--bg', '#eae8f0');
          root.setProperty('--card-bg', '#f0eef7');
          root.setProperty('--shadow', '12px 12px 24px #b8b4c4, -12px -12px 24px #ffffff');
          root.setProperty('--shadow-inset', 'inset 4px 4px 10px #b8b4c4, inset -4px -4px 10px #ffffff');
          root.setProperty('--shadow-soft', '6px 6px 14px #b8b4c4, -6px -6px 14px #ffffff');
          root.setProperty('--ink', '#201e3a');
          root.setProperty('--ink2', '#49446b');
          root.setProperty('--muted', '#7a7799');
          root.setProperty('--white', '#f6f4fe');
          document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';
        }
      });

      loadMore('all', 'trending', '', 1, false);
      loadQuiz();
      updateFavBadge();

      const observerInit = new MutationObserver(() => {
        setupInfiniteScroll();
      });
      observerInit.observe(document.getElementById('main'), { childList: true, subtree: true });

      document.getElementById('creatorLink').addEventListener('click', (e) => {
        e.preventDefault();
        window.open('https://github.com/saqlainabbas11', '_blank');
      });

    })();
  </script>
</body>
</html>
