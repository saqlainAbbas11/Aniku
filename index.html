<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0" />
  <title>Aniku · by Saqlain Abbas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eae8f0;
      --card: #f0eef7;
      --sh: 12px 12px 24px #b8b4c4, -12px -12px 24px #ffffff;
      --shi: inset 4px 4px 10px #b8b4c4, inset -4px -4px 10px #ffffff;
      --shs: 6px 6px 14px #b8b4c4, -6px -6px 14px #ffffff;
      --p: #8b6bff;
      --p2: #b19eff;
      --pink: #ff5e7a;
      --mint: #4d6bd9;
      --gold: #f59e0b;
      --ink: #201e3a;
      --ink2: #49446b;
      --muted: #7a7799;
      --r: 24px;
      --r2: 16px;
      --rs: 12px;
      --max-w: 640px;
      --trans: all 0.2s ease;
    }

    .dark {
      --bg: #13111f;
      --card: #1d1a2e;
      --sh: 12px 12px 28px #0a0914, -12px -12px 28px #2f2a46;
      --shi: inset 4px 4px 12px #0a0914, inset -4px -4px 12px #2f2a46;
      --shs: 6px 6px 16px #0a0914, -6px -6px 16px #2f2a46;
      --p: #a78bff;
      --p2: #c9b8ff;
      --pink: #ff6b8a;
      --mint: #6b8ff5;
      --gold: #fbbf24;
      --ink: #f0eeff;
      --ink2: #c4bce0;
      --muted: #9b95bb;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 14px;
      display: flex;
      justify-content: center;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    #sakura-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      opacity: 1;
    }
    .dark #sakura-canvas { opacity: 0.2; }

    .app {
      max-width: var(--max-w);
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    .neu   { background: var(--card); border-radius: var(--r);  box-shadow: var(--sh);  transition: var(--trans); }
    .neu-s { background: var(--card); border-radius: var(--r2); box-shadow: var(--shs); transition: var(--trans); }
    .neu-i { background: var(--card); border-radius: var(--r2); box-shadow: var(--shi); }

    .topbar {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 14px; gap: 8px;
    }

    .wordmark {
      font-size: 26px; font-weight: 900;
      letter-spacing: -1.5px; color: var(--ink);
      flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
    }
    .wordmark em {
      font-style: normal;
      background: linear-gradient(135deg, #8b6bff, #ff5e7a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .wm-icon {
      font-size: 22px;
      animation: spinSlow 8s linear infinite;
      display: inline-block;
    }
    @keyframes spinSlow { to { transform: rotate(360deg); } }

    .creator-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px 5px 10px;
      background: var(--card); border-radius: 40px;
      box-shadow: var(--shs);
      font-size: 11px; font-weight: 600; color: var(--ink2);
      cursor: pointer; transition: var(--trans); flex-shrink: 1;
      text-decoration: none;
    }
    .creator-chip:hover { box-shadow: var(--shi); }
    .creator-chip .shimmer-name {
      background: linear-gradient(90deg, #8b6bff, #ff5e7a, #f59e0b, #8b6bff);
      background-size: 300%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      animation: shimmer 4s ease infinite;
    }
    @keyframes shimmer { 0%,100%{background-position:0%} 50%{background-position:100%} }

    .topbar-icons { display: flex; gap: 8px; flex-shrink: 0; }
    .icon-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--card); box-shadow: var(--shs);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 17px; color: var(--ink2);
      transition: var(--trans); border: none; position: relative;
    }
    .icon-btn:hover { box-shadow: var(--shi); }
    .icon-btn:active { box-shadow: var(--shi); transform: scale(0.93); }
    .badge {
      position: absolute; top: -3px; right: -3px;
      background: var(--pink); color: #fff;
      font-size: 9px; font-weight: 800;
      padding: 1px 5px; border-radius: 99px; display: none;
    }
    .badge.show { display: block; }

    .hero-video {
      position: relative;
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--sh);
      background: var(--card);
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .hero-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-video .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.1);
      backdrop-filter: blur(1px);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .hero-video .overlay .play-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      transition: transform 0.2s ease;
    }
    .hero-video:hover .overlay .play-icon { transform: scale(1.08); }
    .hero-video .overlay.hide { opacity: 0; pointer-events: none; }
    .dark .hero-video .overlay { background: rgba(0,0,0,0.25); }
    .hero-video .caption {
      position: absolute;
      bottom: 14px;
      left: 14px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      padding: 6px 14px;
      border-radius: 40px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      pointer-events: none;
    }

    .search-wrap {
      position: relative;
      background: var(--card);
      border-radius: 60px;
      box-shadow: var(--shi);
      padding: 4px 4px 4px 18px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: box-shadow 0.25s ease, background 0.25s ease;
    }
    .search-wrap:focus-within {
      box-shadow: var(--sh);
      background: var(--card);
    }
    .search-wrap .si {
      color: var(--p);
      font-size: 18px;
      pointer-events: none;
      flex-shrink: 0;
    }
    .search-wrap input {
      flex: 1;
      padding: 13px 8px 13px 4px;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: var(--ink);
      outline: none;
      min-width: 0;
    }
    .search-wrap input::placeholder { color: var(--muted); font-weight: 500; }
    .search-clear {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 0 10px 0 4px;
      display: none;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .search-clear:hover { color: var(--ink); }

    .src-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 4px; }
    .scroll-row { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 6px; scrollbar-width: none; }
    .scroll-row::-webkit-scrollbar { display: none; }

    .stab, .cat-chip {
      padding: 9px 18px; border-radius: 40px;
      font-size: 12px; font-weight: 800;
      cursor: pointer; white-space: nowrap;
      background: var(--card);
      color: var(--ink2);
      border: none; flex-shrink: 0;
      transition: var(--trans);
    }
    .stab.sel, .cat-chip.sel {
      box-shadow: var(--shi);
      color: var(--p);
    }
    .stab:active, .cat-chip:active { transform: scale(0.93); }

    .row-between { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .filter-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 16px; border-radius: 40px;
      font-size: 12px; font-weight: 800;
      background: var(--card); box-shadow: var(--shs);
      color: var(--ink2); border: none; cursor: pointer;
      transition: var(--trans); flex-shrink: 0;
    }
    .filter-btn:hover { box-shadow: var(--shi); }
    .filter-btn.on { box-shadow: var(--shi); color: var(--p); }
    .filter-btn .dot-ct {
      background: var(--pink); color: #fff;
      font-size: 9px; font-weight: 800;
      padding: 1px 6px; border-radius: 99px;
      display: none;
    }
    .filter-btn .dot-ct.show { display: inline-block; }

    .filter-panel {
      background: var(--card); border-radius: var(--r);
      box-shadow: var(--sh); padding: 20px;
      display: none; flex-direction: column; gap: 14px;
    }
    .filter-panel.open { display: flex; animation: slideDown 0.28s ease; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

    .frow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .flabel { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; min-width: 52px; }

    .fsel {
      padding: 8px 14px; border: none; border-radius: 40px;
      background: var(--card); box-shadow: var(--shi);
      font-size: 12px; font-weight: 700; font-family: inherit;
      color: var(--ink); outline: none; cursor: pointer;
      transition: var(--trans);
    }
    .fsel:focus { box-shadow: var(--sh); }

    .year-range-wrap { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .year-range-display {
      font-size: 13px; font-weight: 800; color: var(--p);
      background: var(--card); border-radius: 40px;
      box-shadow: var(--shi); padding: 6px 14px;
      min-width: 120px; text-align: center;
    }
    .dual-slider { position: relative; height: 32px; flex: 1; min-width: 160px; }
    .dual-slider input[type=range] {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 100%; pointer-events: none;
      background: transparent; height: 4px;
    }
    .dual-slider input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--p); box-shadow: 0 2px 8px rgba(139,107,255,.5);
      pointer-events: all; cursor: pointer;
      transition: transform .15s;
    }
    .dual-slider input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.25); }
    .dual-slider input[type=range]::-webkit-slider-runnable-track { height: 4px; border-radius: 4px; background: var(--shi); }
    .slider-track {
      position: absolute; top: 50%; transform: translateY(-50%);
      height: 4px; border-radius: 4px; background: var(--p); pointer-events: none;
    }
    .slider-bg { position: absolute; top: 50%; transform: translateY(-50%); height: 4px; width: 100%; border-radius: 4px; background: var(--card); box-shadow: var(--shi); }

    .fbtns { display: flex; gap: 8px; justify-content: flex-end; }
    .f-apply {
      padding: 8px 20px; border: none; border-radius: 40px;
      background: linear-gradient(135deg,var(--p),var(--pink));
      color: #fff; font-weight: 800; font-size: 12px;
      cursor: pointer; transition: var(--trans); font-family: inherit;
      box-shadow: 0 4px 16px rgba(139,107,255,.35);
    }
    .f-apply:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(139,107,255,.45); }
    .f-apply:active { transform: scale(0.96); }
    .f-reset {
      padding: 8px 16px; border: none; border-radius: 40px;
      background: var(--card); box-shadow: var(--shs);
      color: var(--ink2); font-weight: 700; font-size: 12px;
      cursor: pointer; transition: var(--trans); font-family: inherit;
    }
    .f-reset:hover { box-shadow: var(--shi); }

    .filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .ftag {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 99px;
      font-size: 10px; font-weight: 700;
      background: rgba(139,107,255,.15); color: var(--p);
    }
    .ftag .x { cursor: pointer; font-size: 13px; opacity: .7; }
    .ftag .x:hover { opacity: 1; }

    .favs-panel {
      background: var(--card); border-radius: var(--r);
      box-shadow: var(--sh); padding: 16px;
      display: none; flex-direction: column; gap: 10px;
    }
    .favs-panel.open { display: flex; }
    .panel-hdr { display: flex; justify-content: space-between; align-items: center; }
    .panel-hdr h3 { font-size: 15px; font-weight: 800; }
    .close-btn { background: none; border: none; font-size: 22px; color: var(--ink2); cursor: pointer; line-height: 1; }

    .fav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid rgba(128,128,128,.08);
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-item img { width: 40px; height: 56px; object-fit: cover; border-radius: 8px; background: #d9d3e8; flex-shrink: 0; }
    .fav-info { flex: 1; min-width: 0; }
    .fav-info .tt { font-weight: 700; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fav-info .mm { font-size: 10px; color: var(--muted); }
    .fav-rm { background: none; border: none; color: var(--pink); font-size: 18px; cursor: pointer; flex-shrink: 0; }

    .quiz-card {
      background: var(--card); border-radius: var(--r);
      box-shadow: var(--sh); padding: 18px;
      display: flex; flex-direction: column; gap: 12px;
      position: relative; overflow: hidden;
    }
    .quiz-card::before {
      content: '⛩️';
      position: absolute; right: -10px; bottom: -10px;
      font-size: 70px; opacity: .3; pointer-events: none;
    }
    .quiz-q { font-size: 15px; font-weight: 800; line-height: 1.45; }
    .quiz-progress { display: flex; gap: 3px; }
    .qp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--card); box-shadow: var(--shi); transition: .3s; }
    .qp-dot.done { background: var(--p); box-shadow: none; }
    .quiz-input {
      padding: 11px 16px; border: none; border-radius: 60px;
      background: var(--card); box-shadow: var(--shi);
      font-size: 13px; font-weight: 600;
      font-family: inherit; color: var(--ink); outline: none; width: 100%;
    }
    .quiz-input:focus { box-shadow: var(--sh); }
    .quiz-row { display: flex; gap: 8px; }
    .quiz-btn {
      padding: 11px 24px; border: none; border-radius: 60px;
      background: linear-gradient(135deg,var(--p),var(--pink));
      color: #fff; font-weight: 800; font-size: 13px;
      cursor: pointer; transition: var(--trans); font-family: inherit;
      box-shadow: 0 4px 14px rgba(139,107,255,.3);
      flex-shrink: 0;
    }
    .quiz-btn:hover { transform: translateY(-1px); }
    .quiz-btn:active { transform: scale(0.95); }
    .quiz-skip {
      padding: 11px 16px; border: none; border-radius: 60px;
      background: var(--card); box-shadow: var(--shs);
      color: var(--muted); font-weight: 700; font-size: 12px;
      cursor: pointer; font-family: inherit; transition: var(--trans);
    }
    .quiz-skip:hover { box-shadow: var(--shi); }
    .quiz-fb { font-weight: 700; font-size: 13px; min-height: 20px; }
    .quiz-fb.ok { color: #10b981; }
    .quiz-fb.ng { color: var(--pink); }

    .sec-hdr { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
    .sec-lbl { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.8px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .sec-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

    .feat-card {
      background: var(--card); border-radius: var(--r);
      box-shadow: var(--sh); overflow: hidden;
      cursor: pointer; transition: var(--trans);
    }
    .feat-card:hover { transform: translateY(-3px); box-shadow: var(--sh), 0 12px 32px rgba(139,107,255,.15); }
    .feat-card:active { transform: scale(0.98); box-shadow: var(--shi); }
    .feat-img { width: 100%; height: 200px; object-fit: cover; background: #d9d3e8; display: block; }
    .feat-overlay { padding: 14px 16px 18px; background: var(--card); }
    .feat-src { display: inline-block; padding: 3px 10px; border-radius: 40px; font-size: 9px; font-weight: 800; margin-bottom: 6px; }
    .feat-score { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 800; background: rgba(139,107,255,.12); color: var(--p); padding: 3px 10px; border-radius: 40px; float: right; }
    .feat-title { font-size: 17px; font-weight: 900; line-height: 1.25; margin: 4px 0 4px; clear: both; }
    .feat-meta { font-size: 11px; font-weight: 600; color: var(--ink2); }
    .feat-tags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .feat-tag { padding: 3px 10px; border-radius: 99px; font-size: 9px; font-weight: 800; background: rgba(139,107,255,.12); color: var(--p); }

    .bento { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .a-card {
      background: var(--card); border-radius: var(--r2);
      box-shadow: var(--shs); overflow: hidden;
      cursor: pointer; transition: var(--trans);
    }
    .a-card:hover { transform: translateY(-2px); box-shadow: var(--sh); }
    .a-card:active { transform: scale(0.96); box-shadow: var(--shi); }
    .a-img-wrap { position: relative; width: 100%; aspect-ratio: 2/3; background: #d9d3e8; overflow: hidden; }
    .a-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .35s ease; }
    .a-card:hover .a-img { transform: scale(1.06); }
    .a-score { position: absolute; bottom: 7px; left: 7px; background: rgba(255,255,255,.88); backdrop-filter: blur(4px); border-radius: 99px; padding: 2px 8px; font-size: 10px; font-weight: 800; color: #1e1a2e; display: flex; align-items: center; gap: 3px; }
    .dark .a-score { background: rgba(30,26,50,.88); color: #f0eeff; }
    .a-fav {
      position: absolute; top: 7px; right: 7px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,.85); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer; border: none;
      transition: var(--trans); color: var(--muted);
    }
    .dark .a-fav { background: rgba(30,26,50,.85); }
    .a-fav.on { color: var(--pink); }
    .a-fav:hover { transform: scale(1.2); }
    .a-body { padding: 9px 11px 11px; }
    .a-title { font-size: 12px; font-weight: 700; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .a-sub { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 3px; display: flex; align-items: center; gap: 4px; }
    .sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .row-card {
      background: var(--card); border-radius: var(--r2);
      box-shadow: var(--shs); display: flex;
      overflow: hidden; cursor: pointer; transition: var(--trans);
    }
    .row-card:hover { box-shadow: var(--sh); transform: translateX(3px); }
    .row-card:active { transform: scale(0.97); box-shadow: var(--shi); }
    .row-img { width: 66px; flex-shrink: 0; object-fit: cover; background: #d9d3e8; }
    .row-body { padding: 11px 13px; flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
    .row-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-meta { font-size: 10px; color: var(--muted); font-weight: 600; }
    .row-score { font-size: 11px; font-weight: 800; color: var(--p); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
    .row-src { font-size: 8px; font-weight: 800; padding: 2px 8px; border-radius: 40px; }

    .detail { display: none; flex-direction: column; gap: 14px; }
    .detail.open { display: flex; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 800; cursor: pointer;
      padding: 10px 18px; border-radius: 60px;
      background: var(--card); box-shadow: var(--shs);
      border: none; color: var(--ink); transition: var(--trans);
      width: fit-content;
    }
    .back-btn:hover { box-shadow: var(--sh); }
    .back-btn:active { box-shadow: var(--shi); transform: scale(0.96); }
    .det-hero { background: var(--card); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; }
    .det-cover-wrap { position: relative; overflow: hidden; }
    .det-cover {
      width: 100%; height: 230px; object-fit: cover;
      background: #d9d3e8; cursor: pointer; display: block;
      transition: transform .4s ease;
    }
    .det-cover-wrap:hover .det-cover { transform: scale(1.04); }
    .det-cover-wrap:hover .enlarge-hint { opacity: 1; transform: translateY(0); }
    .enlarge-hint {
      position: absolute; bottom: 14px; right: 14px;

   SAKURA CANVAS

(function initSakura() {
  const canvas = document.getElementById('sakura-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, petals = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function mkPetal() {
    return {
      x: Math.random() * W,
      y: Math.random() * H - H,
      r: 3 + Math.random() * 7,
      rot: Math.random() * Math.PI * 2,
      vx: -0.8 + Math.random() * 1.6,
      vy: 0.6 + Math.random() * 1.5,
      vr: (0.6 - Math.random()) * 0.05,
      alpha: 0.5 + Math.random() * 0.5,
      hue: 330 + Math.random() * 30
    };
  }

  for (let i = 0; i < 50; i++) petals.push(mkPetal());

  function draw() {
    ctx.clearRect(0, 0, W, H);
    petals.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.r, p.r * 0.5, 0, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${p.hue},80%,82%)`;
      ctx.fill();
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      if (p.y > H + 30) {
        Object.assign(p, mkPetal(), { y: -30 });
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

    let lo = parseInt(slMin.value), hi = parseInt(slMax.value);

    const pct = (v) => ((v - 1960) / (2026 - 1960)) * 100;

    yearDisp.textContent = (lo === 1960 && hi === 2026) ? 'Any' :

      if (filters.yearMin > 1960 || filters.yearMax < 2026) {
        const y = a.year;
        if (!y || y < filters.yearMin || y > filters.yearMax) return false;
      }
      if (filters.genre) {
        const genres = (a.genres||[]).map(g=>g.toLowerCase());
        if (!genres.some(g=>g.includes(filters.genre.toLowerCase()))) return false;
      }
      if (filters.status) {
        const st = (a.status||'').toLowerCase();
        if (filters.status === 'airing'   && !st.match(/air|current|releas/)) return false;
        if (filters.status === 'finished' && !st.match(/finish|complete/)) return false;
        if (filters.status === 'upcoming' && !st.match(/upcom|not_yet|not yet/)) return false;
      }
      if (filters.score) {
        if (a.score == null || a.score < parseInt(filters.score)) return false;
      }
      return true;
    });
  }

  /* ─── API: JIKAN ─── */
  async function fetchJikan(mode, q, pg) {
    try {
      let url;
      const params = new URLSearchParams({ limit:'12', page: pg });
      if (q) { url = `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&${params}`; }
      else if (mode==='airing')   url = `https://api.jikan.moe/v4/top/anime?filter=airing&${params}`;
      else if (mode==='top')      url = `https://api.jikan.moe/v4/top/anime?${params}`;
      else if (mode==='upcoming') url = `https://api.jikan.moe/v4/top/anime?filter=upcoming&${params}`;
      else if (mode==='manga')    url = `https://api.jikan.moe/v4/top/manga?${params}`;
      else                        url = `https://api.jikan.moe/v4/top/anime?${params}`;

      if (filters.genre && !q) {
        const gmap = {action:1,adventure:2,comedy:4,drama:8,fantasy:10,horror:14,mystery:7,romance:22,'sci-fi':24,'slice of life':36,sports:30,thriller:41};
        const gid = gmap[filters.genre.toLowerCase()];
        if (gid) url += `&genres=${gid}`;
      }

      const r = await fetch(url);
      const j = await r.json();
      return (j.data||[]).map(a => ({
        id: 'jik_'+a.mal_id, src:'jikan', rawId:a.mal_id,
        title: a.title, titleEn: a.title_english||'',
        img: a.images?.jpg?.image_url||'',
        imgLg: a.images?.jpg?.large_image_url||'',
        score: a.score ? a.score*10 : null,
        eps: a.episodes, status: a.status,
        type: a.type,
        year: a.year||a.aired?.prop?.from?.year||null,
        genres: (a.genres||[]).map(g=>g.name).slice(0,5),
        synopsis: a.synopsis, rank: a.rank, members: a.members,
        isManga: mode==='manga'
      }));
    } catch(e) { console.warn('Jikan error',e); return []; }
  }

  /* ─── API: ANILIST ─── */
  async function fetchAniList(mode, q, pg) {
    try {
      const isManga = mode==='manga';
      const type = isManga ? 'MANGA' : 'ANIME';
      let sort='TRENDING_DESC', statusQ='', genreQ='';
      if (mode==='top')      sort='SCORE_DESC';
      if (mode==='popular')  sort='POPULARITY_DESC';
      if (mode==='upcoming') statusQ='status: NOT_YET_RELEASED,';
      if (mode==='airing')   statusQ='status: RELEASING,';
      if (filters.genre) genreQ = `genre: "${filters.genre}",`;

      const gql = q
        ? `query($s:String,$p:Int){Page(page:$p,perPage:12){media(search:$s,type:${type},sort:POPULARITY_DESC){id title{romaji english}coverImage{large}averageScore episodes chapters status startDate{year}genres description}}}`
        : `query($p:Int){Page(page:$p,perPage:12){media(type:${type},sort:${sort},${genreQ}${statusQ}){id title{romaji english}coverImage{large}averageScore episodes chapters status startDate{year}genres description}}}`;

      const r = await fetch('https://graphql.anilist.co', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ query:gql, variables: q?{s:q,p:pg}:{p:pg} })
      });
      const j = await r.json();
      return (j.data?.Page?.media||[]).map(a => ({
        id:'al_'+a.id, src:'anilist', rawId:a.id,
        title: a.title.romaji, titleEn: a.title.english||'',
        img: a.coverImage?.large||'', imgLg: a.coverImage?.large||'',
        score: a.averageScore,
        eps: a.episodes||a.chapters,
        status: a.status, year: a.startDate?.year||null,
        genres: (a.genres||[]).slice(0,5),
        synopsis: a.description?.replace(/<[^>]+>/g,''),
        isManga: isManga
      }));
    } catch(e) { console.warn('AniList error',e); return []; }
  }

  /* ─── API: KITSU ─── */
  async function fetchKitsu(mode, q, pg) {
    try {
      const isManga = mode === 'manga';
      const endpoint = isManga ? 'manga' : 'anime';
      const limit = 12;
      const offset = (pg - 1) * limit;
      const fields = isManga
        ? 'canonicalTitle,titles,posterImage,averageRating,chapterCount,volumeCount,status,startDate,synopsis,userCount,favoritesCount'
        : 'canonicalTitle,titles,posterImage,averageRating,showType,episodeCount,status,startDate,synopsis,userCount,favoritesCount';

      let sort = '-userCount';
      let statusFilter = '';
      if (mode === 'top') sort = '-averageRating';
      if (filters.status) {
        const sm = { airing:'current', finished:'finished', upcoming:'upcoming' };
        if (sm[filters.status]) statusFilter = `filter[status]=${sm[filters.status]}&`;
      }

      let url;
      if (q) {
        url = `https://kitsu.io/api/edge/${endpoint}?filter[text]=${encodeURIComponent(q)}&page[limit]=${limit}&page[offset]=${offset}&fields[${endpoint}]=${fields}`;
      } else {
        url = `https://kitsu.io/api/edge/${endpoint}?sort=${sort}&${statusFilter}page[limit]=${limit}&page[offset]=${offset}&fields[${endpoint}]=${fields}`;
      }

      const r = await fetch(url, { headers: { 'Accept':'application/vnd.api+json' } });
      const j = await r.json();
      if (!j.data?.length) return [];

      return j.data.map(a => {
        const at = a.attributes || {};
        const rawScore = at.averageRating ? parseFloat(at.averageRating) : null;
        const year = at.startDate ? parseInt(at.startDate.slice(0,4)) : null;
        const poster = at.posterImage || {};
        const img   = poster.small || poster.medium || poster.tiny || '';
        const imgLg = poster.original || poster.large || poster.medium || img;
        const title = at.canonicalTitle || at.titles?.en || at.titles?.en_jp || at.titles?.ja_jp || 'Unknown';

        return {
          id: 'kit_'+a.id, src:'kitsu', rawId:a.id,
          title, titleEn: at.titles?.en||at.titles?.en_us||'',
          img, imgLg,
          score: rawScore,
          eps: at.episodeCount || at.chapterCount || null,
          status: statusLabel(at.status),
          type: at.showType || (isManga ? 'Manga' : 'TV'),
          year,
          genres: [],
          synopsis: at.synopsis || 'No synopsis available.',
          isManga,
          members: at.userCount || null
        };
      });
    } catch(e) { console.warn('Kitsu error',e); return []; }
  }

  /* ─── LOAD MORE ─── */
  async function loadMore(append = true) {
    if (loading) return;
    loading = true;
    const main = $('main');

    if (!append) { main.innerHTML=''; page=1; hasMore=true; }

    const loader = Object.assign(document.createElement('div'), { className:'loading', innerHTML:`<div class="spinner"></div><div class="ld-txt">Fetching anime…</div>` });
    main.appendChild(loader);

    let items = [];
    const [j, al, ki] = await Promise.all([
      (src==='all'||src==='jikan')   ? fetchJikan(cat, query, page)   : [],
      (src==='all'||src==='anilist') ? fetchAniList(cat, query, page) : [],
      (src==='all'||src==='kitsu')   ? fetchKitsu(cat, query, page)   : [],
    ]);
    items = [...j, ...al, ...ki];

    const seen = new Set();
    items = items.filter(a => { if(seen.has(a.id)) return false; seen.add(a.id); return true; });

    items = clientFilter(items);

    items.forEach(a => { if(!allItems[a.id]) allItems[a.id] = a; });

    loader.remove();
    if (!append) main.innerHTML = '';

    if (!items.length) {
      hasMore = false;
      main.insertAdjacentHTML('beforeend','<div class="inf-trigger">✨ No results — try different filters</div>');
      loading = false; return;
    }

    renderItems(items, main);
    loading = false;
    if (items.length < 10) hasMore = false;
    setupScroll();
  }

  function reload() { loadMore(false); }

  /* ─── RENDER ─── */
  function renderItems(items, container) {
    const groups = {};
    items.forEach(a => { (groups[a.src]||(groups[a.src]=[])).push(a); });

    let idx = 0;
    for (const [s, arr] of Object.entries(groups)) {
      const C = sc(s);
      const sec = document.createElement('div');
      sec.className = 'anim'; sec.style.display='flex'; sec.style.flexDirection='column'; sec.style.gap='8px';
      sec.style.animationDelay = (idx*0.06)+'s';

      sec.innerHTML = `<div class="sec-hdr"><span class="sec-lbl"><span class="sec-dot" style="background:${C.dot}"></span>${s.toUpperCase()}</span></div>`;

      if (arr[0]) {
        const a = arr[0];
        const fc = document.createElement('div'); fc.className='feat-card anim'; fc.style.animationDelay='.04s';
        const gHtml = (a.genres||[]).map(g=>`<span class="feat-tag">${g}</span>`).join('');
        fc.innerHTML = `
          <img class="feat-img" src="${a.imgLg||a.img}" alt="${a.title}" loading="lazy" onerror="this.src='';this.style.minHeight='160px';this.style.background='#d9d3e8'">
          <div class="feat-overlay">
            <span class="feat-src" style="background:${C.bg};color:${C.tx};">${s.toUpperCase()}</span>
            <span class="feat-score"><i class="fas fa-star" style="color:var(--gold)"></i> ${scoreStr(a.score)}</span>
            <div class="feat-title">${a.title}</div>
            <div class="feat-meta">${a.type||(a.isManga?'Manga':'Anime')}${a.year?' · '+a.year:''}${a.eps?' · '+a.eps+(a.isManga?' ch':' ep'):''}</div>
            ${gHtml?`<div class="feat-tags">${gHtml}</div>`:''}
          </div>`;
        fc.addEventListener('click', ()=>openDetail(a));
        sec.appendChild(fc);
      }

      const gridArr = arr.slice(1,7);
      if (gridArr.length) {
        const grid = document.createElement('div'); grid.className='bento';
        gridArr.forEach((a,i) => {
          const p = pal(i);
          const isFav = favs.has(a.id);
          const card = document.createElement('div'); card.className='a-card anim'; card.style.animationDelay=(i*.05)+'s';
          card.innerHTML = `
            <div class="a-img-wrap" style="background:${p.bg}">
              <img class="a-img" src="${a.img}" alt="${a.title}" loading="lazy" onerror="this.src='';this.parentNode.style.background='${p.bg}'">
              <div class="a-score"><i class="fas fa-star" style="color:var(--gold);font-size:8px"></i> ${scoreStr(a.score)}</div>
              <button class="a-fav ${isFav?'on':''}" data-id="${a.id}">${isFav?'♥':'♡'}</button>
            </div>
            <div class="a-body">
              <div class="a-title">${a.title}</div>
              <div class="a-sub"><span class="sdot" style="background:${statusDot(a.status)}"></span>${statusLabel(a.status)}</div>
            </div>`;
          card.querySelector('.a-fav').addEventListener('click', e => { e.stopPropagation(); toggleFav(a, e.currentTarget); });
          card.addEventListener('click', ()=>openDetail(a));
          grid.appendChild(card);
        });
        sec.appendChild(grid);
      }

      arr.slice(7,10).forEach((a,i) => {
        const C2 = sc(a.src);
        const rc = document.createElement('div'); rc.className='row-card anim'; rc.style.animationDelay=(i*.04+.2)+'s';
        rc.innerHTML = `
          <img class="row-img" src="${a.img}" alt="${a.title}" loading="lazy" onerror="this.src='';this.style.background='#d9d3e8'">
          <div class="row-body">
            <div class="row-title">${a.title}</div>
            <div class="row-meta">${a.year||'—'}${a.eps?' · '+a.eps+(a.isManga?' ch':' ep'):''}</div>
            <div class="row-score"><i class="fas fa-star" style="color:var(--gold)"></i> ${scoreStr(a.score)} <span class="row-src" style="background:${C2.bg};color:${C2.tx}">${a.src}</span></div>
          </div>`;
        rc.addEventListener('click',()=>openDetail(a));
        sec.appendChild(rc);
      });

      container.appendChild(sec);
      idx++;
    }

    if (hasMore) {
      const trig = Object.assign(document.createElement('div'),{className:'inf-trigger', id:'infTrig', textContent:'Loading more…'});
      container.appendChild(trig);
    }
  }

  let obs;
  function setupScroll() {
    if (obs) obs.disconnect();
    const trig = $('infTrig');
    if (!trig) return;
    obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting && hasMore && !loading) { page++; loadMore(true); }
    }, { rootMargin:'120px' });
    obs.observe(trig);
  }

  /* ─── FAV ─── */
  function toggleFav(a, btn) {
    if (favs.has(a.id)) { favs.delete(a.id); btn.classList.remove('on'); btn.textContent='♡'; }
    else { favs.add(a.id); btn.classList.add('on'); btn.textContent='♥'; spawnConfetti(btn); }
    updateFavBadge(); renderFavs();
  }

  function updateFavBadge() {
    const b = $('favBadge'); b.textContent = favs.size;
    b.classList.toggle('show', favs.size > 0);
  }

  function renderFavs() {
    const list = $('favsList');
    if (!favs.size) { list.innerHTML='<div style="color:var(--muted);padding:8px 0;font-size:13px;">No favourites yet — heart something! ♡</div>'; return; }
    const items = [...favs].map(id=>allItems[id]).filter(Boolean);
    list.innerHTML = items.map(a=>`
      <div class="fav-item">
        <img src="${a.img}" alt="${a.title}" onerror="this.src='';this.style.background='#d9d3e8'">
        <div class="fav-info"><div class="tt">${a.title}</div><div class="mm">${a.src} · ${a.year||'—'}</div></div>
        <button class="fav-rm" data-id="${a.id}">×</button>
      </div>`).join('');
    list.querySelectorAll('.fav-rm').forEach(el=>el.addEventListener('click',()=>{
      favs.delete(el.dataset.id); updateFavBadge(); renderFavs();
      document.querySelectorAll(`.a-fav[data-id="${el.dataset.id}"]`).forEach(b=>{b.classList.remove('on');b.textContent='♡';});
    }));
  }

  $('favToggle').addEventListener('click',()=>{ $('favsPanel').classList.toggle('open'); renderFavs(); });
  $('closeFavs').addEventListener('click',()=>$('favsPanel').classList.remove('open'));

  /* ─── DETAIL ─── */
  async function openDetail(a) {
    $('main').style.display='none';
    const det = $('detail'); det.classList.add('open');
    const dc = $('detContent');
    dc.innerHTML='<div class="loading"><div class="spinner"></div><div class="ld-txt">Loading details…</div></div>';
    window.scrollTo(0,0);

    let ex = {};
    try {
      if (a.src==='jikan') {
        const r = await fetch(`https://api.jikan.moe/v4/${a.isManga?'manga':'anime'}/${a.rawId}`);
        const j = await r.json();
        ex = { score: j.data?.score?j.data.score*10:a.score, synopsis:j.data?.synopsis||a.synopsis,
          members:j.data?.members, rank:j.data?.rank, genres:(j.data?.genres||[]).map(g=>g.name) };
      } else if (a.src==='anilist') {
        const gql=`query($id:Int){Media(id:$id){coverImage{extraLarge}genres averageScore popularity description episodes chapters}}`;
        const r=await fetch('https://graphql.anilist.co',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:gql,variables:{id:a.rawId}})});
        const j=await r.json(); const m=j.data?.Media;
        if(m) ex={imgLg:m.coverImage?.extraLarge||a.imgLg, score:m.averageScore||a.score,
          synopsis:m.description?.replace(/<[^>]+>/g,'')||a.synopsis, genres:m.genres||[], popularity:m.popularity, eps:m.episodes||m.chapters};
      } else if (a.src==='kitsu') {
        const ep = a.isManga?'manga':'anime';
        const r=await fetch(`https://kitsu.io/api/edge/${ep}/${a.rawId}?include=categories`,{headers:{'Accept':'application/vnd.api+json'}});
        const j=await r.json();
        const at=j.data?.attributes;
        const cats=(j.included||[]).filter(x=>x.type==='categories').map(x=>x.attributes?.title||x.attributes?.name||'');
        if(at) ex={
          imgLg: at.posterImage?.original||at.posterImage?.large||a.imgLg,
          score: at.averageRating?parseFloat(at.averageRating):a.score,
          synopsis:at.synopsis||a.synopsis,
          genres: cats.filter(Boolean),
          userCount:at.userCount
        };
      }
    } catch(e) { console.warn('detail fetch',e); }

    const m = {...a,...ex};
    const C = sc(a.src);
    const gChips = (m.genres||[]).map((g,i)=>`<span class="dchip" style="background:${pal(i).bg};color:${pal(i).tx}">${g}</span>`).join('');

    dc.innerHTML=`
      <div class="det-hero anim">
        <div class="det-cover-wrap">
          <img class="det-cover" src="${m.imgLg||m.img}" alt="${m.title}" onclick="openPoster('${(m.imgLg||m.img).replace(/'/g,"\\'")}')">
          <div class="enlarge-hint"><i class="fas fa-expand"></i> Click to enlarge</div>
        </div>
        <div class="det-body">
          <div class="det-top">
            <div>
              <div class="det-title">${m.title}</div>
              ${m.titleEn?`<div class="det-eng">${m.titleEn}</div>`:''}
            </div>
            <span class="dchip" style="background:${C.bg};color:${C.tx};flex-shrink:0;margin-top:4px">${a.src.toUpperCase()}</span>
          </div>
          <div class="det-chips">
            <span class="dchip" style="background:#ede5ff;color:#4a1d96">${m.isManga?'Manga':'Anime'}</span>
            ${m.year?`<span class="dchip" style="background:#fffbd6;color:#78350f">${m.year}</span>`:''}
            ${m.eps?`<span class="dchip" style="background:#c8f7ec;color:#065f46">${m.eps} ${m.isManga?'ch':'ep'}</span>`:''}
            ${m.status?`<span class="dchip" style="background:#ffd6e8;color:#7c2d46">${statusLabel(m.status)}</span>`:''}
            ${gChips}
          </div>
          <p class="det-syn">${trunc(m.synopsis,1400)}</p>
        </div>
      </div>
      <div class="det-stats anim">
        <div class="dstat" style="background:#ede5ff"><div class="dstat-v" style="color:#4a1d96">${scoreStr(m.score)}</div><div class="dstat-l">Score /100</div></div>
        <div class="dstat" style="background:#c8f7ec"><div class="dstat-v" style="color:#065f46">${m.eps||'—'}</div><div class="dstat-l">${m.isManga?'Chapters':'Episodes'}</div></div>
        ${m.members!=null?`<div class="dstat" style="background:#d6eeff"><div class="dstat-v" style="color:#1a4a6b;font-size:16px">${parseInt(m.members).toLocaleString()}</div><div class="dstat-l">MAL members</div></div>`:''}

        ${m.userCount!=null?`<div class="dstat" style="background:#ffe8d6"><div class="dstat-v" style="color:#7c2d12;font-size:16px">${parseInt(m.userCount).toLocaleString()}</div><div class="dstat-l">Kitsu users</div></div>`:''}
        ${m.rank!=null?`<div class="dstat" style="background:#fffbd6"><div class="dstat-v" style="color:#78350f">#${m.rank}</div><div class="dstat-l">Rank</div></div>`:''}
      </div>`;
  }

  /* ─── QUIZ ─── */
  let quizQ;

    $('quizInput').value=''; $('quizFb').textContent=''; $('quizFb').className='quiz-fb';

    setTimeout(loadQuiz,1800);
  });
  $('quizInput').addEventListener('keydown',e=>{ if(e.key==='Enter') $('quizBtn').click(); });
  $('quizSkip').addEventListener('click',()=>{ quizIdx++; loadQuiz(); });

  /* ─── CONFETTI ─── */
  function spawnConfetti(anchor) {
    const rect = anchor.getBoundingClientRect();
    spawnConfettiAt(null, rect.left+rect.width/2, rect.top+rect.height/2);
  }
  function spawnConfettiAt(el, cx, cy) {
    if(el) { const r=el.getBoundingClientRect(); cx=r.left+r.width/2; cy=r.top; }
    const colors=['#8b6bff','#ff5e7a','#f59e0b','#10b981','#60a5fa'];
    for(let i=0;i<10;i++) {
      const dot = document.createElement('div');
      dot.className='confetti-dot';
      dot.style.cssText=`left:${cx+(-20+Math.random()*40)}px;top:${cy}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*.3}s`;
      document.body.appendChild(dot);
      setTimeout(()=>dot.remove(),1100);
    }
  }

  /* ─── THEME TOGGLE ─── */
  $('themeToggle').addEventListener('click',()=>{
    dark=!dark;
    document.body.classList.toggle('dark',dark);
    $('themeToggle').innerHTML = dark
      ? '<i class="fas fa-sun" style="color:#fbbf24"></i>'
      : '<i class="fas fa-moon" style="color:#e2c96e"></i>';
  });

  /* ─── MASCOT ─── */
  let mascotTipIdx=0;
  $('mascotBtn').addEventListener('click',()=>{
    const bub=$('mascotBubble');
    bub.textContent=MASCOT_TIPS[mascotTipIdx%MASCOT_TIPS.length];
    bub.classList.add('show');
    mascotTipIdx++;
    clearTimeout(sbTimer);
    sbTimer=setTimeout(()=>bub.classList.remove('show'),4000);
  });
  setTimeout(()=>{ $('mascotBubble').textContent=MASCOT_TIPS[0]; $('mascotBubble').classList.add('show'); sbTimer=setTimeout(()=>$('mascotBubble').classList.remove('show'),5000); },6000);

  /* ─── VIDEO PLAY / LOOP / QUALITY ─── */
  const heroVideo = document.getElementById('heroVideo');
  const videoOverlay = document.getElementById('videoOverlay');

  // Loop
  heroVideo.loop = true;

  // Ensure good quality: let browser choose best, but we can hint
  heroVideo.setAttribute('playsinline', '');
  // For better quality on some devices, try to load with higher bitrate if available
  // The source is fixed; we can attempt to set quality by reloading if needed, but not necessary.

  // Toggle play/pause + overlay
  function toggleVideoPlay() {
    if (heroVideo.paused) {
      heroVideo.play().catch(e => console.warn('Play failed:', e));
      videoOverlay.classList.add('hide');
    } else {
      heroVideo.pause();
      videoOverlay.classList.remove('hide');
    }
  }

  // Click on video container toggles
  document.querySelector('.hero-video').addEventListener('click', toggleVideoPlay);

  // If video ends (loop is on, but just in case)
  heroVideo.addEventListener('ended', () => {
    // loop will handle it
  });

  // If video is playing, hide overlay, else show
  heroVideo.addEventListener('play', () => videoOverlay.classList.add('hide'));
  heroVideo.addEventListener('pause', () => videoOverlay.classList.remove('hide'));

  // If video is loaded and autoplay fails, show overlay
  heroVideo.addEventListener('loadedmetadata', () => {
    if (heroVideo.paused) videoOverlay.classList.remove('hide');
  });

  // Initial: ensure overlay is visible if paused
  setTimeout(() => {
    if (heroVideo.paused) videoOverlay.classList.remove('hide');
  }, 300);

  /* ─── INIT ─── */
  loadMore(false);
  loadQuiz();
  updateFavBadge();

  new MutationObserver(()=>setupScroll()).observe($('main'),{childList:true,subtree:false});

})();
</script>
</body>
</html>
